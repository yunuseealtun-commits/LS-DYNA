                            <FileText size={12} /> Open in OneNote Editor
                          </button>
                          <div className="border-t border-gray-300"></div>
                          <button className="text-left px-3 py-1.5 hover:bg-[#000080] hover:text-white flex items-center gap-2"
                            onClick={() => {
                              const task = postProcessingTasks.find(t => t.id === ppContextMenu.taskId);
                              if (task) {
                                setEditingPPTask(task.id);
                                setEditingPPTaskText(task.text);
                              }
                              setPpContextMenu(prev => ({ ...prev, visible: false }));
                            }}
                          >
                            <Type size={12} /> Rename
                          </button>
                          <div className="px-3 py-1 flex flex-col gap-1 border-t border-gray-300">
                            <span className="text-[10px] text-gray-600 font-bold">Highlight Color</span>
                            <div className="flex gap-1 flex-wrap">
                              {['#ffb3ba', '#ffdfba', '#ffffba', '#baffc9', '#bae1ff', 'transparent'].map(c => (
                                <button key={`bg-${c}`} className="w-5 h-5 rounded border border-gray-400 hover:scale-110 transition-transform cursor-pointer" style={{ backgroundColor: c === 'transparent' ? '#fff' : c }}
                                  title={c}
                                  onClick={() => {
                                    setPostProcessingTasks(prev => {
                                      const n = prev.map(t => t.id === ppContextMenu.taskId ? { ...t, color: c === 'transparent' ? '' : c } : t);
                                      localStorage.setItem('lsdyna_pp_tasks', JSON.stringify(n));
                                      return n;
                                    });
                                    setPpContextMenu(prev => ({ ...prev, visible: false }));
                                  }}
                                >
                                  {c === 'transparent' && <span className="text-[8px] text-gray-400">X</span>}
                                </button>
                              ))}
                            </div>
                          </div>
                          <div className="border-t border-gray-300"></div>
                          <button className="text-left px-3 py-1.5 hover:bg-[#000080] hover:text-white flex items-center gap-2 text-red-700"
                            onClick={() => {
                              if (window.confirm("Are you sure you want to delete this item permanently?")) {
                                setPostProcessingTasks(prev => {
                                  const n = prev.filter(t => t.id !== ppContextMenu.taskId);
                                  localStorage.setItem('lsdyna_pp_tasks', JSON.stringify(n));
                                  return n;
                                });
                              }
                              setPpContextMenu(prev => ({ ...prev, visible: false }));
                            }}
                          >
                            <X size={12} /> Delete Item
                          </button>
                        </div>
                      )}

                    </div>
                  )}
                </div>
              </DraggableWindow>
            )
            }
            {/* Open Keyword Forms */}
            {
              openForms.map(form => (
                <DraggableWindow
                  key={form.id}
                  id={form.id}
                  title={`*${form.node.name.replace(/^\*/, '')} Input Form`}
                  initialPos={form.pos}
                  zIndex={form.zIndex}
                  onFocus={() => {
                    const newZ = maxZIndex + 1;
                    setMaxZIndex(newZ);
                    setOpenForms(prev => prev.map(f => f.id === form.id ? { ...f, zIndex: newZ } : f));
                  }}
                  onClose={() => setOpenForms(prev => prev.filter(f => f.id !== form.id))}
                  isMinimized={form.isMinimized}
                  onMinimize={() => setOpenForms(prev => prev.map(f => f.id === form.id ? { ...f, isMinimized: true } : f))}
                  isMaximized={form.isMaximized}
                  onMaximize={() => setOpenForms(prev => prev.map(f => f.id === form.id ? { ...f, isMaximized: !f.isMaximized } : f))}
                  width={1000}
                >
                  <div className="p-2 flex-1 flex flex-col h-full bg-[#f0f0f0] min-h-0 overflow-auto" >
                    <InputFormView editingNode={form.node} onClose={() => setOpenForms(prev => prev.filter(f => f.id !== form.id))} />
                  </div>
                </DraggableWindow>
              ))
            }
            {/* Key Manager Overlay */}
            <div style={{ display: isKeyManagerOpen ? 'block' : 'none' }}>
              <DraggableWindow
                id="keyManager"
                title={<><Settings size={14} className="inline mr-1" /> Applied Keywords Manager</>}
                zIndex={keyManagerWindow.zIndex}
                onFocus={() => {
                  const newZ = maxZIndex + 1;
                  setMaxZIndex(newZ);
                  setKeyManagerWindow(prev => ({ ...prev, zIndex: newZ }));
                }}
                onClose={() => setIsKeyManagerOpen(false)}
                isMinimized={keyManagerWindow.isMinimized}
                onMinimize={() => setKeyManagerWindow(prev => ({ ...prev, isMinimized: true }))}
                isMaximized={keyManagerWindow.isMaximized}
                onMaximize={() => setKeyManagerWindow(prev => ({ ...prev, isMaximized: !prev.isMaximized }))}
                initialPos={keyManagerWindow.pos}
                width={800}
                height={600}
                allowOverflow={true}
              >
                <div className="w-full h-full flex flex-col bg-[#eef0f4] font-sans overflow-hidden p-2 text-sm" >
                  <div className="flex gap-4 h-full min-h-0">
                    {/* Left Panel: Saved Sets */}
                    <div className="w-1/3 flex flex-col gap-2 border-r border-gray-400 pr-2 h-full">
                      <div className="font-bold text-[#000080] border-b border-gray-300 pb-1 shrink-0">Kayıtlı Setler (Saved Configs)</div>
                      <div className="flex flex-col gap-1 overflow-y-auto flex-1 bg-white p-1 border border-gray-300">
                        {savedKeywordSets.length === 0 && <div className="text-gray-500 italic text-xs">Henüz kaydedilmiş bir set yok.</div>}
                        {savedKeywordSets.map(set => (
                          <div key={set.id} className="bg-gray-100 border border-gray-300 p-2 shadow-sm rounded flex flex-col gap-1 relative group shrink-0">
                            <div className="font-semibold text-blue-900 leading-tight pr-4">{set.name}</div>
                            <div className="text-[10px] text-gray-500">{new Date(set.date).toLocaleString()} • {set.data.length} Keywords</div>
                            <button
                              className="absolute top-1 right-1 hidden group-hover:block text-red-500 hover:bg-red-100 p-1 rounded"
                              onClick={() => {
                                if (window.confirm('Bu seti silmek istediğine emin misin?')) {
                                  setSavedKeywordSets(prev => {
                                    const next = prev.filter(s => s.id !== set.id);
                                    localStorage.setItem('lsdyna_keyword_sets', JSON.stringify(next));
                                    if (compareSetA === set.id) setCompareSetA('');
                                    if (compareSetB === set.id) setCompareSetB('');
                                    return next;
                                  });
                                }
                              }}
                            >
                              <X size={12} />
                            </button>
                          </div>
                        ))}
                      </div>
                      <div className="mt-2 pt-2 border-t border-gray-300 flex flex-col gap-1 shrink-0">
                        <div className="text-xs text-gray-700 font-bold mb-1">Mevcut 'Applied' Durumunu Kaydet:</div>
                        <input
                          type="text"
                          placeholder="Set Adı (Örn: Model V2)"
                          className="border border-gray-400 p-1 text-sm w-full"
                          value={newSetName}
                          onChange={e => setNewSetName(e.target.value)}
                        />
                        <button
                          className="bg-[#000080] text-white px-2 py-1 text-xs hover:bg-blue-800 shadow mt-1"
                          onClick={() => {
                            const data = getAppliedData();
                            if (data.length === 0) return alert("Hiçbir keyword 'Applied' olarak işaretlenmemiş.");
                            if (!newSetName.trim()) return alert("Lütfen bir set adı girin.");
                            setSavedKeywordSets(prev => {
                              const next = [...prev, { id: Date.now().toString(), name: newSetName.trim(), date: Date.now(), data }];
                              localStorage.setItem('lsdyna_keyword_sets', JSON.stringify(next));
                              return next;
                            });
                            setNewSetName('');
                          }}
                        >
                          <Plus size={12} className="inline mr-1" /> Seti Kaydet
                        </button>
                      </div>
                    </div>
                    {/* Right Panel: Comparison Diff */}
                    <div className="w-2/3 flex flex-col gap-2 pl-2 h-full">
                      <div className="font-bold text-[#000080] border-b border-gray-300 pb-1 shrink-0">Karşılaştırma (Diff Viewer)</div>
                      <div className="flex gap-2 shrink-0">
                        <select className="flex-1 border border-gray-400 p-1 text-xs truncate" value={compareSetA} onChange={e => setCompareSetA(e.target.value)}>
                          <option value="">-- Set A Seç --</option>
                          {savedKeywordSets.map(s => <option key={s.id} value={s.id}>{s.name}</option>)}
                        </select>
                        <select className="flex-1 border border-gray-400 p-1 text-xs truncate" value={compareSetB} onChange={e => setCompareSetB(e.target.value)}>
                          <option value="">-- Set B Seç --</option>
                          {savedKeywordSets.map(s => <option key={s.id} value={s.id}>{s.name}</option>)}
                        </select>
                      </div>
                      <div className="flex-1 bg-white border border-gray-400 overflow-y-auto p-2 text-xs font-mono">
                        {(() => {
                          if (!compareSetA || !compareSetB) return <div className="text-gray-500 italic mt-4 text-center">Karşılaştırma için iki farklı set seçin.</div>;
                          if (compareSetA === compareSetB) return <div className="text-gray-500 italic mt-4 text-center">İki aynı seti karşılaştıramazsınız.</div>;

                          const setAItem = savedKeywordSets.find(s => s.id === compareSetA);
                          const setBItem = savedKeywordSets.find(s => s.id === compareSetB);

                          const setA = setAItem?.data || [];
                          const setB = setBItem?.data || [];

                          // Collect all keyword names
                          const allTitles = Array.from(new Set([...setA.map(a => a.name), ...setB.map(b => b.name)])).sort();
                          let diffCount = 0;

                          const elements = allTitles.map(title => {
                            const kwA = setA.find(a => a.name === title);
                            const kwB = setB.find(b => b.name === title);

                            if (!kwA) { diffCount++; return <div key={title} className="mb-2 p-1 border border-green-300 bg-green-50"><strong className="text-green-700">+ {title.replace(/^\*/, '')}</strong> (Yalnızca Set B'de)</div>; }
                            if (!kwB) { diffCount++; return <div key={title} className="mb-2 p-1 border border-red-300 bg-red-50"><strong className="text-red-700">- {title.replace(/^\*/, '')}</strong> (Yalnızca Set A'da)</div>; }

                            // Both exist, check params
                            const allParams = Array.from(new Set([...Object.keys(kwA.params), ...Object.keys(kwB.params)]));
                            const diffs = [];
                            allParams.forEach(p => {
                              const valA = kwA.params[p];
                              const valB = kwB.params[p];
                              if (valA !== valB) diffs.push({ param: p, a: valA || '(boş)', b: valB || '(boş)' });
                            });

                            if (diffs.length === 0) return null; // Identical

                            diffCount++;
                            return (
                              <div key={title} className="mb-2 border border-orange-300 bg-orange-50 p-1">
                                <strong className="text-[#000080]">~ {title.replace(/^\*/, '')}</strong>
                                <div className="ml-4 mt-1 flex flex-col gap-0.5">
                                  {diffs.map((d, i) => (
                                    <div key={i} className="flex gap-2 bg-white px-1 py-0.5 border border-gray-200">
                                      <span className="w-20 font-bold shrink-0">{d.param}:</span>
                                      <span className="text-red-600 line-through bg-red-100 flex-1 truncate px-1" title={d.a}>{d.a}</span>
                                      <span className="text-green-700 bg-green-100 flex-1 px-1 break-all" title={d.b}>{d.b}</span>
                                    </div>
                                  ))}
                                </div>
                              </div>
                            );
                          });

                          if (diffCount === 0) {
                            return <div className="text-green-600 font-bold text-center mt-4">✅ İki set birbiriyle tamamen aynı. Hiçbir fark yok.</div>;
                          }
                          return elements;
                        })()}
                      </div>
                    </div>
                  </div>
                </div>
              </DraggableWindow>
            </div>

            {/* Tabbed Editor Overlay */}
            <div style={{ display: editorWindow.isVisible ? 'block' : 'none' }}>
              <DraggableWindow
                id="editor"
                title={<><FileText size={14} className="inline mr-1 text-blue-500" /> Tabbed Notes</>}
                zIndex={editorWindow.zIndex}
                onFocus={() => {
                  const newZ = maxZIndex + 1;
                  setMaxZIndex(newZ);
                  setEditorWindow(prev => ({ ...prev, zIndex: newZ }));
                }}
                onClose={() => {
                  setEditorWindow(prev => ({ ...prev, isVisible: false }));
                }}
                isMinimized={editorWindow.isMinimized}
                onMinimize={() => setEditorWindow(prev => ({ ...prev, isMinimized: true }))}
                isMaximized={editorWindow.isMaximized}
                onMaximize={() => setEditorWindow(prev => ({ ...prev, isMaximized: !prev.isMaximized }))}
                initialPos={{ x: 50, y: 50 }}
                width={1400}
                height={700}
                maxHeight={2000}
                allowOverflow={true}
              >
                <div className="w-full h-full flex flex-col bg-[#eef0f4] font-sans rounded-b-lg overflow-hidden" >
                  {/* Chrome-like Tabs Header */}
                  <div className="flex px-2 pt-2 bg-gray-300 border-b border-gray-400 gap-1 overflow-x-auto shrink-0 mt-1">
                    {editorTabs.map(tab => (
                      <div
                        key={tab.id}
                        onClick={() => setActiveTabId(tab.id)}
                        className={`flex items-center gap-2 px-4 py-2 rounded-t-lg cursor-pointer text-sm font-medium transition-colors ${activeTabId === tab.id ? 'bg-white text-blue-800 border-t-2 border-t-blue-500 shadow-sm z-10' : 'bg-gray-200 text-gray-600 hover:bg-gray-100 border border-transparent border-b-gray-400'}`}
                      >
                        <FileText size={14} className={activeTabId === tab.id ? 'text-blue-600' : 'text-gray-500'} />
                        {tab.title}
                        <button
                          onClick={(e) => {
                            e.stopPropagation();
                            const newTabs = editorTabs.filter(t => t.id !== tab.id);
                            setEditorTabs(newTabs);
                            if (activeTabId === tab.id && newTabs.length > 0) {
                              setActiveTabId(newTabs[newTabs.length - 1].id);
                            } else if (newTabs.length === 0) {
                              setActiveTabId(null);
                              setEditorWindow(prev => ({ ...prev, isVisible: false }));
                            }
                          }}
                          className={`ml-2 rounded-full p-0.5 ${activeTabId === tab.id ? 'hover:bg-blue-100 text-gray-500 hover:text-red-500' : 'hover:bg-gray-400 text-gray-500 hover:text-white'}`}
                        >
                          <X size={12} />
                        </button>
                      </div>
                    ))}
                  </div>

                  {/* Editor Tools Header */}
                  <div className="flex items-center px-4 py-2 bg-white border-b shadow-sm gap-4 shrink-0 z-20">
                    <div className="ml-auto flex items-center gap-3">
                      <span className="text-xs text-gray-500 font-bold bg-green-100 text-green-700 px-2 py-1 rounded">✔ Auto-Saved to LocalStorage</span>
                      <span className="text-xs text-gray-400 ml-2">Zoom: {editorZoom}%</span>
                    </div>
                  </div>

                  {/* Editor Canvas Area */}
                  <div className="flex-1 bg-[#eef0f4] relative flex flex-col min-h-0 p-6 overflow-auto"
                    onWheel={(e) => {
                      if (e.ctrlKey) {
                        e.preventDefault();
                        if (e.deltaY < 0) setEditorZoom(z => Math.min(z + 10, 300));
                        else setEditorZoom(z => Math.max(z - 10, 50));
                      }
                    }}
                  >
                    <div className="bg-white rounded-lg shadow-md mx-auto min-h-full transition-transform origin-top-center onenote-editor border border-gray-200 flex flex-col"
                      style={{ width: '850px', maxWidth: '95%', zoom: `${editorZoom}%` }}>
                      {activeTabId ? (
                        <VanillaQuillEditor
                          key={activeTabId}
                          value={
                            editorTabs.find(t => t.id === activeTabId)?.type === 'parameter'
                              ? (parameterNotes[activeTabId] || '')
                              : (postProcessingTasks.find(t => t.id === activeTabId)?.details || '')
                          }
                          onChange={handleEditorChange}
                          className="flex-1 border-0 text-[14px] flex flex-col min-h-0"
                          modules={quillModules}
                          autoFocus={true}
                        />
                      ) : (
                        <div className="flex-1 flex items-center justify-center text-gray-400 italic font-medium p-10 text-center">
                          No notes open.<br />Open a parameter note from the Keyword Tree.
                        </div>
                      )}
                    </div>
                  </div>
                </div>
              </DraggableWindow>
            </div>

            {/* Mind Map Window */}
            {isMindMapOpen && (
              <DraggableWindow
                id="mindmap"
                title={<><Folder size={14} className="inline mr-1 text-yellow-500 fill-yellow-500" /> Mind Map Hub</>}
                initialPos={mindMapWindow.pos}
                zIndex={mindMapWindow.zIndex}
                width={800} height={600}
                isMinimized={mindMapWindow.isMinimized}
                onMinimize={() => setMindMapWindow(prev => ({ ...prev, isMinimized: true }))}
                isMaximized={mindMapWindow.isMaximized}
                onMaximize={() => setMindMapWindow(prev => ({ ...prev, isMaximized: !prev.isMaximized }))}
                onClose={() => setIsMindMapOpen(false)}
                onFocus={() => {
                  const newZ = maxZIndex + 1;
                  setMaxZIndex(newZ);
                  setMindMapWindow(prev => ({ ...prev, zIndex: newZ }));
                }}
              >
                <MindMapCanvas />
              </DraggableWindow>
            )}

            {/* Render Bottom Taskbar */}
            <TaskBar windows={getTaskbarWindows()} onWindowClick={handleTaskbarClick} />
          </div >
        </AppContext.Provider >
      );
    };

    const root = createRoot(document.getElementById('root'));
    root.render(<KeywordManager />);
  </script>
</body>

</html>
