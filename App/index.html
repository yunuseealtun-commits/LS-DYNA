                                                    newRows[rowIdx] = [...newRows[rowIdx]];
                                                    newRows[rowIdx][colIdx] = { ...newRows[rowIdx][colIdx], val: newVal };
                                                    return { ...n, rows: newRows };
                                                  }
                                                  if (n.children) return { ...n, children: updateFieldVal(n.children) };
                                                  return n;
                                                });
                                              };
                                              return updateFieldVal(prev);
                                            });
                                          }}
                                          className="border border-gray-400 bg-white h-[20px] px-1 text-blue-800 outline-none shadow-inner w-full text-[11px] disabled:bg-gray-100 disabled:border-gray-200 focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all"
                                        />
                                      </>
                                    ) : (
                                      <div className="h-[36px] w-full flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">
                                        <button
                                          className="text-[10px] text-gray-400 hover:text-blue-600 border border-dashed border-gray-300 hover:border-blue-400 w-full rounded"
                                          onClick={() => {
                                            const newName = window.prompt("Enter new parameter name:");
                                            if (newName) {
                                              setTreeData(prev => {
                                                const updateFieldVal = (nodes) => {
                                                  return nodes.map(n => {
                                                    if (n.id === editingNode.id) {
                                                      const newRows = [...n.rows];
                                                      newRows[rowIdx] = [...newRows[rowIdx]];
                                                      newRows[rowIdx][colIdx] = { label: newName, val: '' };
                                                      return { ...n, rows: newRows };
                                                    }
                                                    if (n.children) return { ...n, children: updateFieldVal(n.children) };
                                                    return n;
                                                  });
                                                };
                                                return updateFieldVal(prev);
                                              });
                                            }
                                          }}
                                        >+ Add</button>
                                      </div>
                                    )}
                                </div>
                              );
                            })}

                            {/* Inject the "Optional Cards" radio for CONTROL_CONTACT exactly like image after row 2 */}
                            {
                              editingNode.name === 'CONTROL_CONTACT' && rowIdx === 1 && (
                                <div className="col-span-9 ml-8 my-2" >
                                  <fieldset className="border border-gray-300 p-2 relative flex gap-4 text-[11px] bg-[#f0f0f0] inline-flex" >
                                    <legend className="absolute -top-2 left-2 px-1 bg-[#f0f0f0] text-gray-700" > Active optional cards </legend>
                                    < label className="flex items-center gap-1 cursor-pointer" > <input type="radio" name="opt" /> None </label>
                                    < label className="flex items-center gap-1 cursor-pointer" > <input type="radio" name="opt" /> Opt1 </label>
                                    < label className="flex items-center gap-1 cursor-pointer" > <input type="radio" name="opt" /> Opt12 </label>
                                    < label className="flex items-center gap-1 cursor-pointer" > <input type="radio" name="opt" /> Opt123 </label>
                                    < label className="flex items-center gap-1 cursor-pointer font-bold text-blue-800" > <input type="radio" name="opt" defaultChecked /> Opt1234 </label>
                                    < label className="flex items-center gap-1 cursor-pointer" > <input type="radio" name="opt" /> Opt12345 </label>
                                  </fieldset>
                                </div>
                              )
                            }
                          </React.Fragment>
                        );
                      })}
                    </div>
                  ) : (
                    <div className="flex h-full items-center justify-center text-gray-500 italic" > No parameters available for this keyword.</div>
                  )}
              </div>

              {/* Bottom Text Area */}
              <div className="mt-2 h-[150px] min-h-[50px] border border-gray-400 bg-white shadow-inner p-2 overflow-auto resize-y font-sans shrink-0 text-[12px] relative group flex flex-col" >
                {
                  selectedParameter ? (
                    <>
                      <div className="flex justify-between items-center mb-1 pb-1 border-b border-gray-300 shrink-0" >
                        <div className="font-bold text-[#000080]" > {selectedParameter} Notes: </div>
                        <button
                          className="bg-blue-100 border border-gray-400 hover:bg-blue-200 px-2 py-0.5 text-[10px] rounded text-blue-800 shadow-sm flex items-center gap-1 cursor-pointer"
                          onClick={() => {
                            if (handleOpenNotesEditor) {
                              handleOpenNotesEditor(selectedParameter);
                            }
                          }}
                        >
                          <FileText size={10} /> Tam Ekran Düzenle (Full Editor)
                        </button>
                      </div>
                      <div className="flex-1 w-full min-h-0 flex flex-col" >
                        <VanillaQuillEditor
                          value={(() => {
                            let note = '';
                            editingNode.rows.forEach(r => {
                              r.forEach(c => {
                                if (c.label === selectedParameter) {
                                  note = c.quickNote || '';
                                }
                              });
                            });
                            return note;
                          })()}
                          onChange={(val) => {
                            setTreeData(prev => {
                              const updateFieldNote = (nodes) => {
                                return nodes.map(n => {
                                  if (n.id === editingNode.id) {
                                    const newRows = n.rows.map(r => r.map(c => c.label === selectedParameter ? { ...c, quickNote: val } : c));
                                    return { ...n, rows: newRows };
                                  }
                                  if (n.children) return { ...n, children: updateFieldNote(n.children) };
                                  return n;
                                });
                              };
                              return updateFieldNote(prev);
                            });
                          }}
                          className="flex-1 border-none bg-white font-sans text-xs"
                          modules={miniQuillModules}
                          placeholder={`Enter quick notes for ${selectedParameter}...`}
                        />
                      </div>
                    </>
                  ) : (
                    <div className="text-gray-500 italic font-mono h-full flex items-center justify-center bg-gray-50" > $# Select a parameter to view or quick-edit its notes...</div>
                  )}
              </div>
            </div>

            {/* Right Side: General Notes */}
            <div className="flex-[1] flex flex-col min-w-0 min-h-0 border border-gray-400 bg-white shadow-sm">
              <div className="bg-[#000080] font-bold text-white p-1 text-center border-b border-gray-400 text-xs shadow-sm">General Notes ({editingNode.name.replace(/^\*/, '')})</div>
              <div className="flex-1 flex min-h-0">
                <VanillaQuillEditor
                  value={tempGlobalNote}
                  onChange={(val) => {
                    setTempGlobalNote(val);
                    setTreeData(prev => {
                      const updateGlobalNote = (nodes) => {
                        return nodes.map(n => {
                          if (n.id === editingNode.id) return { ...n, globalNote: val };
                          if (n.children) return { ...n, children: updateGlobalNote(n.children) };
                          return n;
                        });
                      };
                      return updateGlobalNote(prev);
                    });
                  }}
                  className="onenote-editor-wrapper flex-1 border-none font-sans text-[11px] h-full overflow-visible"
                  modules={sidebarQuillModules}
                  placeholder={`Use this space for global keyword notes...`}
                />
              </div>
            </div>
          </div>

          {/* Template Manager ModalOverlay */}
          {isTemplateManagerOpen && (
            <div className="absolute inset-0 bg-black/30 z-[999] flex items-center justify-center p-4">
              <div className="bg-[#f0f0f0] border-2 border-white border-r-gray-600 border-b-gray-600 shadow-xl w-full max-w-md flex flex-col font-sans text-sm">
                <div className="bg-[#000080] text-white font-bold p-1 px-2 flex justify-between items-center">
                  <span>Template Manager</span>
                  <button onClick={() => setIsTemplateManagerOpen(false)} className="bg-[#c0c0c0] text-black border border-white border-r-black border-b-black hover:bg-red-400 hover:text-white px-1 leading-none">X</button>
                </div>
                <div className="p-4 flex flex-col gap-3">
                  <span className="font-bold text-gray-700 text-xs">Available Templates</span>
                  <div className="border border-gray-400 bg-white h-[150px] overflow-y-auto p-1 text-xs">
                    {(() => {
                      const tmpls = JSON.parse(localStorage.getItem('lsdyna_templates') || '{}');
                      const keys = Object.keys(tmpls);
                      if (keys.length === 0) return <div className="text-gray-400 italic p-2">No templates saved.</div>;
                      return keys.map(k => (
                        <div key={k} className="flex justify-between items-center hover:bg-[#e0e0ff] p-1 border-b border-gray-100 cursor-pointer group">
                          <span className="truncate flex-1 font-semibold">{k}</span>
                          <div className="flex gap-1 opacity-0 group-hover:opacity-100">
                            <button className="bg-green-100 hover:bg-green-300 px-2 py-0.5 border border-gray-400" onClick={(e) => {
                              e.stopPropagation();
                              if (window.confirm(`Overwrite current data with template '${k}'?`)) {
                                setTreeData(prev => {
                                  const loadTmpl = (nodes) => {
                                    return nodes.map(n => {
                                      if (n.id === editingNode.id) return { ...n, rows: JSON.parse(JSON.stringify(tmpls[k])) };
                                      if (n.children) return { ...n, children: loadTmpl(n.children) };
                                      return n;
                                    });
                                  };
                                  return loadTmpl(prev);
                                });
                                setIsTemplateManagerOpen(false);
                              }
                            }}>Apply</button>
                            <button className="bg-red-100 hover:bg-red-300 px-2 py-0.5 border border-gray-400 text-red-800" onClick={(e) => {
                              e.stopPropagation();
                              if (window.confirm(`Delete template '${k}'?`)) {
                                delete tmpls[k];
                                localStorage.setItem('lsdyna_templates', JSON.stringify(tmpls));
                                setTemplateNameInput(prev => prev + ' '); // force render hack
                              }
                            }}>Delete</button>
                          </div>
                        </div>
                      ));
                    })()}
                  </div>

                  <div className="flex flex-col gap-1 mt-2">
                    <span className="font-bold text-gray-700 text-xs">Save Current Layout</span>
                    <div className="flex gap-2">
                      <input
                        type="text"
                        value={templateNameInput.trim()}
                        onChange={e => setTemplateNameInput(e.target.value)}
                        placeholder="Name for new template..."
                        className="flex-1 border border-gray-400 px-2 py-1 text-xs"
                      />
                      <button className="bg-[#e0ffe0] border-2 border-white border-r-gray-600 border-b-gray-600 px-3 active:bg-[#c0ffc0]" onClick={() => {
                        const tName = templateNameInput.trim();
                        if (!tName) { alert("Please enter a template name."); return; }
                        const tmpls = JSON.parse(localStorage.getItem('lsdyna_templates') || '{}');
                        tmpls[tName] = editingNode.rows;
                        localStorage.setItem('lsdyna_templates', JSON.stringify(tmpls));
                        setTemplateNameInput('');
                      }}>Save</button>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    };


    const KeywordManager = () => {
      const [activeTab, setActiveTab] = useState('Keyword Tree');
      const [selectedNode, setSelectedNode] = useState(null);
      const [filterText, setFilterText] = useState('');
      const [ppSearchText, setPpSearchText] = useState('');
      const [clipboard, setClipboard] = useState(null);

      // Right-click context menu state
      const [contextMenu, setContextMenu] = useState({ visible: false, x: 0, y: 0, nodeId: null });

      // Window Management State
      // openForms: { id, node, pos: {x,y}, zIndex, isMinimized, isMaximized }
      const [openForms, setOpenForms] = useState([]);

      const [mainWindowPos, setMainWindowPos] = useState({ x: 20, y: 20 });
      const [mainWindowZ, setMainWindowZ] = useState(10);
      const [mainWindowMinimized, setMainWindowMinimized] = useState(false);
      const [mainWindowMaximized, setMainWindowMaximized] = useState(false);
      const [mainWindowClosed, setMainWindowClosed] = useState(true);
      const [maxZIndex, setMaxZIndex] = useState(1);

      // Mind Map State
      const [isMindMapOpen, setIsMindMapOpen] = useState(false);
      const [mindMapWindow, setMindMapWindow] = useState({ isMinimized: false, isMaximized: false, zIndex: 12, pos: { x: 50, y: 50 } });

      // Notes Editor Management & Tabs State
      const [editorTabs, setEditorTabs] = useState([]); // Array of { id: string, type: 'parameter'|'pp_task', title: string }
      const [activeTabId, setActiveTabId] = useState(null);
      const [editorWindow, setEditorWindow] = useState({ isVisible: false, isMinimized: false, isMaximized: true, zIndex: 11 });

      const [editorZoom, setEditorZoom] = useState(100);

      // LS-DYNA Keyword Structure Data mapped perfectly to the requested input parameters
      const [treeData, setTreeData] = useState(initialTreeData);

      const [expandedNodes, setExpandedNodes] = useState({
        'control': true, 'database': false, 'boundary': false, 'contact': true,
        'part': true, 'mat': false, 'section': false, 'eos': false, 'hourglass': false, 'initial': false, 'element': false
      });

      // Parameter Notes State
      const [parameterNotes, setParameterNotes] = useState({});
      const [selectedParameter, setSelectedParameter] = useState(null);
      const [paramContextMenu, setParamContextMenu] = useState({ visible: false, x: 0, y: 0, paramName: null, nodeId: null, rowIdx: null, colIdx: null });

      // Post Processing State
      const [postProcessingTasks, setPostProcessingTasks] = useState(() => {
        try { return JSON.parse(localStorage.getItem('lsdyna_pp_tasks') || '[]'); } catch { return []; }
      });
      const [newPPTask, setNewPPTask] = useState('');
      const [ppContextMenu, setPpContextMenu] = useState({ visible: false, x: 0, y: 0, taskId: null });

      // Start Menu / File Menu State
      const [fileMenuOpen, setFileMenuOpen] = useState(false);

      // Key Manager State
      const [isKeyManagerOpen, setIsKeyManagerOpen] = useState(false);
      const [keyManagerWindow, setKeyManagerWindow] = useState({ isMinimized: false, isMaximized: false, zIndex: 13, pos: { x: 100, y: 100 } });
      const [savedKeywordSets, setSavedKeywordSets] = useState(() => {
        try { return JSON.parse(localStorage.getItem('lsdyna_keyword_sets') || '[]'); } catch { return []; }
      });
      const [newSetName, setNewSetName] = useState('');
      const [compareSetA, setCompareSetA] = useState('');
      const [compareSetB, setCompareSetB] = useState('');

      const getAppliedData = useCallback(() => {
        const results = [];
        const traverse = (nodes) => {
          nodes.forEach(n => {
            if (n.applied) {
              const params = {};
              if (n.rows) {
                n.rows.forEach(r => r.forEach(c => {
                  if (c.label && c.label !== 'UNUSED' && c.val) {
                    params[c.label] = c.val;
                  }
                }));
              }
              results.push({ name: n.name, params });
            }
            if (n.children) traverse(n.children);
          });
        };
        traverse(treeData);
        return results;
      }, [treeData]);

      // Phase 9 UI Refinement States
      const [ppSplitRatio, setPpSplitRatio] = useState(50);
      const [showNewTaskInput, setShowNewTaskInput] = useState(false);
      const [newTaskText, setNewTaskText] = useState('');
      const [showNewWarningInput, setShowNewWarningInput] = useState(false);
      const [newWarningText, setNewWarningText] = useState('');
      const [editingPPTask, setEditingPPTask] = useState(null);
      const [editingPPTaskText, setEditingPPTaskText] = useState('');

      const handleOpenNotesEditor = useCallback((paramName) => {
        setEditorTabs(prev => {
          if (!prev.find(t => t.id === paramName)) {
            return [...prev, { id: paramName, type: 'parameter', title: paramName }];
          }
          return prev;
        });
        setActiveTabId(paramName);
        const newZ = maxZIndex + 1;
        setMaxZIndex(newZ);
        setEditorWindow(prev => ({ ...prev, isVisible: true, isMinimized: false, zIndex: newZ }));
      }, [maxZIndex]);

      const handleOpenPPNotesEditor = useCallback((taskObj) => {
        setEditorTabs(prev => {
          if (!prev.find(t => t.id === taskObj.id)) {
            return [...prev, { id: taskObj.id, type: 'pp_task', title: taskObj.text }];
          }
          return prev;
        });
        setActiveTabId(taskObj.id);
        const newZ = maxZIndex + 1;
        setMaxZIndex(newZ);
        setEditorWindow(prev => ({ ...prev, isVisible: true, isMinimized: false, zIndex: newZ }));
      }, [maxZIndex]);

      // Bulletproof auto-saver for the active editor tab
      const handleEditorChange = useCallback((html) => {
        const activeTab = editorTabs.find(t => t.id === activeTabId);
        if (!activeTab) return;

        if (activeTab.type === 'parameter') {
          // 1. Update parameterNotes mapping
          setParameterNotes(prev => {
            const newNotes = { ...prev, [activeTab.id]: html };
            // Robust crash-proof local storage
            localStorage.setItem('lsdyna_param_notes', JSON.stringify(newNotes));
            return newNotes;
          });

          // 2. Reflect in treeData instantly
          setTreeData(prev => {
            const updateFieldNote = (nodes) => {
              return nodes.map(n => {
                const newRows = n.rows ? n.rows.map(r => r.map(c => c.label === activeTab.id ? { ...c, quickNote: html } : c)) : undefined;
                const updatedNode = newRows ? { ...n, rows: newRows } : n;
                if (updatedNode.children) return { ...updatedNode, children: updateFieldNote(updatedNode.children) };
                return updatedNode;
              });
            };
            return updateFieldNote(prev);
          });
        } else if (activeTab.type === 'pp_task') {
          setPostProcessingTasks(prev => {
            const n = prev.map(t => t.id === activeTab.id ? { ...t, details: html } : t);
            localStorage.setItem('lsdyna_pp_tasks', JSON.stringify(n));
            return n;
          });
        }
      }, [activeTabId, editorTabs]);

      // Undo/Redo History for structural tree changes
      const undoStack = useRef([]);
      const redoStack = useRef([]);

      const commitHistory = useCallback((stateToCommit) => {
        undoStack.current.push(JSON.parse(JSON.stringify(stateToCommit)));
        if (undoStack.current.length > 50) undoStack.current.shift();
        redoStack.current = [];
      }, []);

      const handleUndo = useCallback(() => {
        if (undoStack.current.length > 0) {
          setTreeData(prev => {
            redoStack.current.push(JSON.parse(JSON.stringify(prev)));
            return undoStack.current.pop();
          });
        }
      }, []);

      const exportKeywords = useCallback(() => {
        let output = "=== LS-DYNA APPLIED KEYWORDS EXPORT ===\n\n";
        let count = 0;

        const traverse = (nodes) => {
          nodes.forEach(n => {
            if (n.applied) {
              count++;
              output += `*${n.name.replace(/^\*/, '')}\n`;
              if (n.rows && n.rows.length > 0) {
                n.rows.forEach((row) => {
                  row.forEach(col => {
                    if (col.label && col.label !== 'UNUSED') {
                      output += `${col.label}: ${col.val} | `;
                    }
                  });
                  output = output.slice(0, -3) + '\n';
                });
              }
              output += '\n';
            }
            if (n.children) traverse(n.children);
          });
        };
        traverse(treeData);

        if (count === 0) {
          alert("No keywords are currently marked as 'Applied'. Right-click a keyword in the tree to apply it.");
          return;
        }

        const blob = new Blob([output], { type: 'text/plain;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `LS-DYNA_Applied_Keywords_${new Date().toISOString().split('T')[0]}.txt`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
      }, [treeData]);

      const handleRedo = useCallback(() => {
        if (redoStack.current.length > 0) {
          setTreeData(prev => {
            undoStack.current.push(JSON.parse(JSON.stringify(prev)));
            return redoStack.current.pop();
          });
        }
      }, []);

      const updateParamProperty = useCallback((nodeId, rowIdx, colIdx, propName, value) => {
        setTreeData(prev => {
          const updateNodes = (nodes) => {
            return nodes.map(n => {
              if (n.id === nodeId) {
                const newRows = [...n.rows];
                newRows[rowIdx] = [...newRows[rowIdx]];
                newRows[rowIdx][colIdx] = { ...newRows[rowIdx][colIdx], [propName]: value };
                return { ...n, rows: newRows };
              }
              if (n.children) return { ...n, children: updateNodes(n.children) };
              return n;
            });
          };
          return updateNodes(prev);
        });
      }, []);

      const updateParamTag = useCallback((nodeId, rowIdx, colIdx, tag) => {
        setTreeData(prev => {
          const updateNodes = (nodes) => {
            return nodes.map(n => {
              if (n.id === nodeId) {
                const newRows = [...n.rows];
                newRows[rowIdx] = [...newRows[rowIdx]];
                const currentTags = newRows[rowIdx][colIdx].tags || [];
                if (!currentTags.includes(tag)) {
                  newRows[rowIdx][colIdx] = { ...newRows[rowIdx][colIdx], tags: [...currentTags, tag] };
                }
                return { ...n, rows: newRows };
              }
              if (n.children) return { ...n, children: updateNodes(n.children) };
              return n;
            });
          };
          return updateNodes(prev);
        });
      }, []);

      const [isSaving, setIsSaving] = useState(false);
      const [saveMessage, setSaveMessage] = useState('');

      // Fetch data on load with rigorous Crash Recovery
      useEffect(() => {
        fetch('/api/data')
          .then(res => {
            if (!res.ok) throw new Error('No existing db, using default keywords.');
            return res.json();
          })
          .then(data => {
            let loadedTreeData = data.treeData || initialTreeData;
            let loadedParamNotes = data.parameterNotes || {};

            // MERGE LOCAL STORAGE TO PREVENT DATA LOSS ON VERCEL
            const localParamNotesRaw = localStorage.getItem('lsdyna_param_notes');
            if (localParamNotesRaw) {
              try {
                const localParamNotes = JSON.parse(localParamNotesRaw);
                loadedParamNotes = { ...loadedParamNotes, ...localParamNotes };

                const mergeIntoTree = (nodes) => nodes.map(n => {
                  const newRows = n.rows ? n.rows.map(r => r.map(c => localParamNotes[c.label] ? { ...c, quickNote: localParamNotes[c.label] } : c)) : undefined;
                  const updatedNode = newRows ? { ...n, rows: newRows } : n;
                  if (updatedNode.children) return { ...updatedNode, children: mergeIntoTree(updatedNode.children) };
                  return updatedNode;
                });
                loadedTreeData = mergeIntoTree(loadedTreeData);
              } catch (e) { }
            }

            setTreeData(loadedTreeData);
            setParameterNotes(loadedParamNotes);
            if (data.expandedNodes) setExpandedNodes(data.expandedNodes);
          })
          .catch(err => {
            console.log('DB Load Info:', err.message);
            // ENTIRELY OFFLINE RECOVERY
            const localParamNotesRaw = localStorage.getItem('lsdyna_param_notes');
            let recoveredTreeData = initialTreeData;
            let recoveredParamNotes = {};

            if (localParamNotesRaw) {
              try {
                recoveredParamNotes = JSON.parse(localParamNotesRaw);
                const mergeIntoTree = (nodes) => nodes.map(n => {
                  const newRows = n.rows ? n.rows.map(r => r.map(c => recoveredParamNotes[c.label] ? { ...c, quickNote: recoveredParamNotes[c.label] } : c)) : undefined;
                  const updatedNode = newRows ? { ...n, rows: newRows } : n;
                  if (updatedNode.children) return { ...updatedNode, children: mergeIntoTree(updatedNode.children) };
                  return updatedNode;
                });
                recoveredTreeData = mergeIntoTree(recoveredTreeData);
              } catch (e) { }
            }

            setTreeData(recoveredTreeData);
            setParameterNotes(recoveredParamNotes);
          });
      }, []);

      const isInitialDbLoad = React.useRef(true);

      const saveDatabase = useCallback((silent = false) => {
        if (!silent) {
          setIsSaving(true);
          setSaveMessage('Saving...');
        }
        const stateObj = { treeData, parameterNotes, expandedNodes };
        fetch('/api/data', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(stateObj)
        })
          .then(res => res.json())
          .then(data => {
            localStorage.setItem('lsdyna_notes_db', JSON.stringify(stateObj));
            if (!silent) {
              setSaveMessage('Saved Successfully!');
              setTimeout(() => setSaveMessage(''), 3000);
            }
          })
          .catch(err => {
            localStorage.setItem('lsdyna_notes_db', JSON.stringify(stateObj));
            if (!silent) {
              setSaveMessage(`Local Saved`);
              setTimeout(() => setSaveMessage(''), 4000);
            }
          })
          .finally(() => {
            if (!silent) setIsSaving(false);
          });
      }, [treeData, parameterNotes, expandedNodes]);

      // Debounced Auto-save
      useEffect(() => {
        if (isInitialDbLoad.current) {
          isInitialDbLoad.current = false;
          return;
        }
        const timer = setTimeout(() => {
          saveDatabase(true);
        }, 1500);
        return () => clearTimeout(timer);
      }, [treeData, parameterNotes, expandedNodes, saveDatabase]);

      // ================= COPY & PASTE (Ctrl+C / Ctrl+V) =================
      const findNodeById = useCallback((nodes, id) => {
        for (const node of nodes) {
          if (node.id === id) return node;
          if (node.children) {
            const found = findNodeById(node.children, id);
            if (found) return found;
          }
        }
        return null;
      }, []);

      const getTotalItemsCount = useCallback((nodes) => {
        return nodes.reduce((count, node) => {
          let current = node.type === 'item' ? 1 : 0;
          let childrenCount = node.children ? getTotalItemsCount(node.children) : 0;
          return count + current + childrenCount;
        }, 0);
      }, []);

      // Name Editing State (Rename)
      const [renamingNodeId, setRenamingNodeId] = useState(null);
      const [renameText, setRenameText] = useState('');

      const handleStartRename = useCallback((id) => {
        const node = findNodeById(treeData, id);
        if (node) {
          setRenamingNodeId(id);
          setRenameText(node.name);
          setContextMenu({ visible: false, x: 0, y: 0, nodeId: null });
        }
      }, [treeData, findNodeById]);

      // Drag and Drop State and Handlers
      const [draggedNodeId, setDraggedNodeId] = useState(null);
      const [dragOverInfo, setDragOverInfo] = useState(null);

      const handleDragStart = useCallback((e, id) => {
        e.stopPropagation();
        setDraggedNodeId(id);
        if (e.dataTransfer) {
          e.dataTransfer.effectAllowed = 'all'; // Required to allow drop 'copy' action
          e.dataTransfer.setData('text/plain', id); // required for Firefox

          const node = findNodeById(treeData, id);
          if (node) {
            const dragGhost = document.createElement('div');
            dragGhost.textContent = ` ${node.name} `;
            dragGhost.style.cssText = 'background: #1e3a8a; color: white; padding: 4px 10px; border-radius: 6px; font-size: 12px; font-weight: bold; position: absolute; top: -1000px; display: inline-block; white-space: nowrap; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);';
            document.body.appendChild(dragGhost);
            e.dataTransfer.setDragImage(dragGhost, 10, 10);
            setTimeout(() => { if (document.body.contains(dragGhost)) document.body.removeChild(dragGhost); }, 100);
          }
        }
      }, [treeData, findNodeById]);

      const handleDragOver = useCallback((e) => {
        e.preventDefault();
        if (e.dataTransfer) e.dataTransfer.dropEffect = 'move';
      }, []);

      const handleDrop = useCallback((e, targetId, position = 'inside') => {
        e.preventDefault();
        e.stopPropagation();

        if (!draggedNodeId || draggedNodeId === targetId) {
          setDragOverInfo(null);
          return;
        }

        setTreeData(prev => {
          let draggedNode = null;
          // First, find and extract the dragged node accurately without losing children
          const extractNode = (nodes) => {
            let extracted = null;
            let remaining = nodes.filter(n => {
              if (n.id === draggedNodeId) {
                extracted = { ...n };
                return false;
              }
              return true;
            }).map(n => {
              if (n.children) {
                const result = extractNode(n.children);
                if (result.extracted) extracted = result.extracted;
                return { ...n, children: result.remaining };
              }
              return n;
            });
            return { extracted, remaining };
          };

          const extractResult = extractNode(prev);
          let treeWithoutDragged = extractResult.remaining;
          draggedNode = extractResult.extracted;
          if (!draggedNode) return prev;

          let inserted = false;
          const insertNode = (nodes) => {
            let newNodes = [];
            for (const n of nodes) {
              if (n.id === targetId) {
                inserted = true;
                if (position === 'inside' && n.type === 'group') {
                  newNodes.push({ ...n, children: [...(n.children || []), draggedNode] });
                  setExpandedNodes(eState => ({ ...eState, [n.id]: true }));
                } else if (position === 'before') {
                  newNodes.push(draggedNode, n);
                } else if (position === 'after') {
                  newNodes.push(n, draggedNode);
                } else {
                  if (n.type === 'group') {
                    newNodes.push({ ...n, children: [...(n.children || []), draggedNode] });
                  } else {
                    newNodes.push(n, draggedNode);
                  }
                }
              } else {
                let newNode = { ...n };
                if (n.children) {
                  newNode.children = insertNode(n.children);
                }
                newNodes.push(newNode);
              }
            }
            return newNodes;
          };

          let finalTree = treeWithoutDragged;
          if (targetId === 'root') {
            inserted = true;
            finalTree = [...treeWithoutDragged, draggedNode];
          } else {
            finalTree = insertNode(treeWithoutDragged);
          }

          if (inserted) commitHistory(prev);
          return inserted ? finalTree : prev;
        });
        setDraggedNodeId(null);
        setDragOverInfo(null);
      }, [draggedNodeId]);

      // Quill Editor Configuration
      useEffect(() => {
        // TableUI removed due to UMD incompatibility
      }, []);

      // Expanded quill modules config with ribbons and macros
      window.katex = window.katex;
      const quillModules = useMemo(() => ({
        toolbar: {
          container: [
            [{ 'header': [1, 2, 3, 4, 5, 6, false] }],
            [{ 'font': [] }, { 'size': ['small', false, 'large', 'huge'] }],
            ['bold', 'italic', 'underline', 'strike'],
            [{ 'color': [] }, { 'background': [] }],
            [{ 'script': 'sub' }, { 'script': 'super' }],
            [{ 'list': 'ordered' }, { 'list': 'bullet' }, { 'list': 'check' }, { 'indent': '-1' }, { 'indent': '+1' }],
            [{ 'align': [] }],
            ['blockquote', 'code-block'],
            ['link', 'image', 'video', 'formula'],
            ['clean'],
            ['insertTable'] // Custom button
          ],
          handlers: {
            'insertTable': function () {
              const range = this.quill.getSelection();
              if (range) {
                const tableHtml = `
                  <table class="onenote-table">
                    <thead><tr><th>Header 1</th><th>Header 2</th><th>Header 3</th></tr></thead>
                    <tbody>
                      <tr><td>Cell</td><td>Cell</td><td>Cell</td></tr>
                      <tr><td>Cell</td><td>Cell</td><td>Cell</td></tr>
                    </tbody>
                  </table><p><br></p>`;
                this.quill.clipboard.dangerouslyPasteHTML(range.index, tableHtml);
              }
            }
          }
        }
      }), []);

      // Add custom icon for the table button when Quill mounts
      useEffect(() => {
        const tableBtn = document.querySelector('.ql-insertTable');
        if (tableBtn && !tableBtn.innerHTML) {
          tableBtn.innerHTML = '<svg viewBox="0 0 18 18"><rect class="ql-stroke" height="12" width="14" x="2" y="3"></rect><line class="ql-stroke" x1="2" x2="16" y1="7" y2="7"></line><line class="ql-stroke" x1="2" x2="16" y1="11" y2="11"></line><line class="ql-stroke" x1="6" x2="6" y1="3" y2="15"></line><line class="ql-stroke" x1="12" x2="12" y1="3" y2="15"></line></svg>';
          tableBtn.setAttribute('title', 'Insert Table');
        }
      });

      const miniQuillModules = useMemo(() => ({ toolbar: false }), []);

      const sidebarQuillModules = useMemo(() => ({
        toolbar: [
          [{ 'font': [] }, { 'size': ['small', false, 'large', 'huge'] }],
          ['bold', 'italic', 'underline', 'strike'],
          [{ 'color': [] }, { 'background': [] }],
          [{ 'list': 'bullet' }, 'link', 'clean']
        ]
      }), []);

      useEffect(() => {
        const handleKeyDown = (e) => {
          if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;

          if (e.ctrlKey && e.key.toLowerCase() === 'z') {
            e.preventDefault();
            handleUndo();
          } else if (e.ctrlKey && e.key.toLowerCase() === 'y') {
            e.preventDefault();
            handleRedo();
          } else if (e.key === 'F2' && selectedNode) {
            handleStartRename(selectedNode);
            e.preventDefault();
          } else if (e.ctrlKey && e.key.toLowerCase() === 'c' && selectedNode) {
            const nodeToCopy = findNodeById(treeData, selectedNode);
            if (nodeToCopy) setClipboard(cloneNode(nodeToCopy));
          } else if (e.ctrlKey && e.key === 'v' && clipboard) {
            pasteNode(clipboard);
          }
        };
        document.addEventListener('keydown', handleKeyDown);
        return () => document.removeEventListener('keydown', handleKeyDown);
      }, [selectedNode, clipboard, treeData, findNodeById, handleStartRename]);

      // ================= ADD, DELETE, PASTE LOGIC =================
      const pasteNode = (copiedNode) => {
        const newNode = cloneNode(copiedNode);
        setTreeData(prev => {
          commitHistory(prev);
          if (!selectedNode) return [...prev, newNode];

          const insertIntoTree = (nodes) => {
            let newNodes = [];
            for (const node of nodes) {
              if (node.id === selectedNode) {
                if (node.type === 'group') {
                  newNodes.push({ ...node, children: [...(node.children || []), newNode] });
                  setExpandedNodes(e => ({ ...e, [node.id]: true }));
                } else {
                  newNodes.push(node, newNode);
                }
              } else if (node.children) {
                newNodes.push({ ...node, children: insertIntoTree(node.children) });
              } else {
                newNodes.push(node);
              }
            }
            return newNodes;
          };
          return insertIntoTree(prev);
        });
      };

      const handleAddFolder = (targetParentId) => {
        const newFolder = { id: generateId(), name: 'NEW_FOLDER', type: 'group', color: '#000000', children: [] };
        setTreeData(prev => {
          commitHistory(prev);
          if (!targetParentId) return [...prev, newFolder];

          const insertIntoTree = (nodes) => {
            let newNodes = [];
            for (const node of nodes) {
              if (node.id === targetParentId) {
                if (node.type === 'group') {
                  newNodes.push({ ...node, children: [...(node.children || []), newFolder] });
                  setExpandedNodes(e => ({ ...e, [node.id]: true }));
                } else {
                  newNodes.push(node, newFolder);
                }
              } else if (node.children) {
                newNodes.push({ ...node, children: insertIntoTree(node.children) });
              } else {
                newNodes.push(node);
              }
            }
            return newNodes;
          };
          return insertIntoTree(prev);
        });
        setRenamingNodeId(newFolder.id);
        setRenameText('NEW_FOLDER');
        setContextMenu({ visible: false, x: 0, y: 0, nodeId: null });
      };

      const handleAddNode = (targetParentId) => {
        let newName = 'NEW_KEYWORD';
        const idToUse = typeof targetParentId === 'string' ? targetParentId : selectedNode;

        // Auto-prefix logic based on selected node's context
        if (idToUse) {
          // Find the selected node to determine its parent or its own name
          const selected = findNodeById(treeData, idToUse);
          if (selected) {
            if (selected.type === 'group') {
              newName = selected.name.replace(/^\*/, '') + '_';
            } else {
              // If it's an item, try to find its parent to get the prefix
              const findParent = (nodes, id, parent = null) => {
                for (const node of nodes) {
                  if (node.id === id) return parent;
                  if (node.children) {
                    const p = findParent(node.children, id, node);
                    if (p) return p;
                  }
                }
                return null;
              };
              const parent = findParent(treeData, idToUse);
              if (parent) {
                newName = parent.name.replace(/^\*/, '') + '_';
              }
            }
          }
        }

        const emptyRow = Array(8).fill(null).map(() => ({ label: 'UNUSED', val: '' }));
        const newNodeItem = { id: generateId(), name: newName, type: 'item', color: '#000000', rows: [emptyRow] };

        setTreeData(prev => {
          commitHistory(prev);
          if (!idToUse) return [...prev, newNodeItem];
          const insertIntoTree = (nodes) => {
            let newNodes = [];
            for (const node of nodes) {
              if (node.id === idToUse) {
                if (node.type === 'group') {
                  newNodes.push({ ...node, children: [...(node.children || []), newNodeItem] });
                  setExpandedNodes(e => ({ ...e, [node.id]: true }));
                } else {
                  newNodes.push(node, newNodeItem);
                }
              } else if (node.children) {
                newNodes.push({ ...node, children: insertIntoTree(node.children) });
              } else {
                newNodes.push(node);
              }
            }
            return newNodes;
          };
          return insertIntoTree(prev);
        });

        setRenamingNodeId(newNodeItem.id);
        setRenameText(newName);
        setContextMenu({ visible: false, x: 0, y: 0, nodeId: null });
        setSelectedNode(newNodeItem.id);
      };

      const handleDeleteNode = (targetId) => {
        const idToUse = typeof targetId === 'string' ? targetId : selectedNode;
        if (!idToUse) return;

        const nodeToDelete = findNodeById(treeData, idToUse);
        if (!nodeToDelete) return;

        const getNames = (node, names = []) => {
          if (node.type !== 'group') names.push(node.name);
          if (node.children) node.children.forEach(c => getNames(c, names));
          return names;
        };

        const affectedNames = getNames(nodeToDelete);
        const confirmMsg = `Are you sure you want to delete ${nodeToDelete.type === 'group' ? 'this folder and ' : ''}these items?\n\n`
          + affectedNames.slice(0, 10).join('\n')
          + (affectedNames.length > 10 ? '\n...and more' : '');

        if (!window.confirm(confirmMsg)) return;

        const deleteFromTree = (nodes) => {
          return nodes.filter(n => n.id !== idToUse).map(n => ({
            ...n,
            children: n.children ? deleteFromTree(n.children) : undefined
          }));
        };
        setTreeData(prev => {
          commitHistory(prev);
          return deleteFromTree(prev);
        });
        if (selectedNode === idToUse) setSelectedNode(null);
        setContextMenu({ visible: false, x: 0, y: 0, nodeId: null });
      };

      const handleRenameSubmit = useCallback(() => {
        if (renamingNodeId && renameText.trim()) {
          setTreeData(prev => {
            const renameInTree = (nodes) => {
              return nodes.map(node => {
                if (node.id === renamingNodeId) {
                  if (node.name !== renameText.trim()) commitHistory(prev);
                  return { ...node, name: renameText.trim() };
                }
                if (node.children) return { ...node, children: renameInTree(node.children) };
                return node;
              });
            };
            return renameInTree(prev);
          });
          setRenamingNodeId(null);
          setRenameText('');
        } else {
          setRenamingNodeId(null);
          setRenameText('');
        }
      }, [renamingNodeId, renameText, setTreeData, commitHistory]);

      // ================= RIGHT CLICK COLOR MENU =================
      const changeNodeColor = (color) => {
        const updateColor = (nodes) => {
          return nodes.map(n => {
            if (n.id === contextMenu.nodeId) return { ...n, color };
            if (n.children) return { ...n, children: updateColor(n.children) };
            return n;
          });
        };
        setTreeData(prev => {
          commitHistory(prev);
          return updateColor(prev);
        });
        setContextMenu({ visible: false, x: 0, y: 0, nodeId: null });
      };

      useEffect(() => {
        const closeMenu = (e) => {
          if (e && e.button === 2) return; // Prevent Right-Click from instantly closing the newly opened menu
          setContextMenu(prev => ({ ...prev, visible: false }));
          setParamContextMenu(prev => ({ ...prev, visible: false }));
        };
        document.addEventListener('pointerdown', closeMenu);
        return () => document.removeEventListener('pointerdown', closeMenu);
      }, []);

      // ================= FILTERING =================
      const filterNodes = (nodes, text) => {
        if (!text) return nodes;
        return nodes.reduce((acc, node) => {
          const matchesNode = node.name.toLowerCase().includes(text.toLowerCase());
          const filteredChildren = node.children ? filterNodes(node.children, text) : undefined;

          if (matchesNode || (filteredChildren && filteredChildren.length > 0)) {
            acc.push({ ...node, children: node.children ? (filteredChildren || []) : undefined });
          }
          return acc;
        }, []);
      };
      const filteredData = useMemo(() => filterNodes(treeData, filterText), [filterText, treeData]);

      const toggleNode = (nodeId) => {
        setExpandedNodes(prev => {
          const newState = { ...prev, [nodeId]: !prev[nodeId] };
          return newState;
        });
      };

      const handleSelect = (node) => {
        setSelectedNode(node.id);
      };
      const handleOpenForm = (node) => {
        if (node.type !== 'group') {
          // Check if already open
          if (openForms.some(f => f.node.id === node.id)) {
            // Bring to front
            const newZ = maxZIndex + 1;
            setMaxZIndex(newZ);
            setOpenForms(prev => prev.map(f => f.node.id === node.id ? { ...f, zIndex: newZ } : f));
            return;
          }

          const newZ = maxZIndex + 1;
          setMaxZIndex(newZ);
          const newId = Date.now().toString() + Math.random().toString(36).substr(2, 5);
          const offset = (openForms.length * 30) % 300;
          setOpenForms(prev => [...prev, {
            id: newId,
            node,
            pos: { x: 100 + offset, y: 100 + offset },
            zIndex: newZ,
            isMinimized: false,
            isMaximized: false
          }]);
        }
      };

      // Taskbar items generation
      const getTaskbarWindows = () => {
        const windows = [];
        if (!mainWindowClosed) {
          windows.push({
            id: 'main',
            title: 'Keyword Manager 98',
            icon: <Settings size={12} className="text-blue-800" />,
            isMinimized: mainWindowMinimized,
            isFocused: mainWindowZ === maxZIndex
          });
        }

        openForms.forEach(form => {
          windows.push({
            id: form.id,
            title: `*${form.node.name.replace(/^\*/, '')}`,
            icon: <FileText size={12} className="text-gray-700" />,
            isMinimized: form.isMinimized,
            isFocused: form.zIndex === maxZIndex
          });
        });

        if (editorWindow.isVisible) {
          windows.push({
            id: 'editor',
            title: 'Tabbed Notes',
            icon: <FileText size={12} className="text-blue-600" />,
            isMinimized: editorWindow.isMinimized,
            isFocused: editorWindow.zIndex === maxZIndex
          });
        }

        if (isMindMapOpen) {
          windows.push({
            id: 'mindmap',
            title: 'Mind Map Hub',
            icon: <Folder size={12} className="text-yellow-600 fill-yellow-600" />,
            isMinimized: mindMapWindow.isMinimized,
            isFocused: mindMapWindow.zIndex === maxZIndex
          });
        }

        return windows;
      };

      const handleTaskbarClick = (id) => {
        const newZ = maxZIndex + 1;
        setMaxZIndex(newZ);

        if (id === 'main') {
          setMainWindowMinimized(prev => mainWindowZ === maxZIndex && !prev ? true : false);
          setMainWindowZ(newZ);
        } else if (id === 'editor') {
          setNotesEditorWindow(prev => ({
            ...prev,
            isMinimized: prev.zIndex === maxZIndex && !prev.isMinimized ? true : false,
            zIndex: newZ
          }));
        } else if (id === 'mindmap') {
          setMindMapWindow(prev => ({
            ...prev,
            isMinimized: prev.zIndex === maxZIndex && !prev.isMinimized ? true : false,
            zIndex: newZ
          }));
        } else {
          setOpenForms(prev => prev.map(f => {
            if (f.id === id) {
              return {
                ...f,
                isMinimized: f.zIndex === maxZIndex && !f.isMinimized ? true : false,
                zIndex: newZ
              };
            }
            return f;
          }));
        }
      };

      const ctxValue = {
        treeData, setTreeData, parameterNotes, setParameterNotes,
        expandedNodes, setExpandedNodes, selectedNode, setSelectedNode,
        renamingNodeId, setRenamingNodeId, renameText, setRenameText,
        draggedNodeId, setDraggedNodeId, dragOverInfo, setDragOverInfo,
        clipboard, setClipboard, contextMenu, setContextMenu,
        openForms, setOpenForms, maxZIndex, setMaxZIndex,
        paramContextMenu, setParamContextMenu, isSaving, setIsSaving,
        saveMessage, setSaveMessage, selectedParameter, setSelectedParameter,
        handleSelect, handleStartRename, handleDragStart, handleDragOver, handleDrop,
        toggleNode, handleRenameSubmit, handleOpenForm, handleOpenNotesEditor, handleOpenPPNotesEditor,
        handleAddFolder, handleAddNode, handleDeleteNode, changeNodeColor, findNodeById,
        miniQuillModules, quillModules, sidebarQuillModules, editorZoom
      };

      return (
        <AppContext.Provider value={ctxValue}>
          <div className="h-screen w-screen bg-teal-800 relative font-sans text-[13px] overflow-hidden" >

            {/* Sticky Notes Background App */}
            <StickyNotesApp />

            {/* Desktop Icons Layer */}
            <div className="absolute inset-0 z-[5] p-4 pointer-events-none flex flex-col gap-4 flex-wrap content-start">
              <div
                className="flex flex-col items-center gap-1 w-[85px] p-2 cursor-pointer hover:bg-white/20 rounded pointer-events-auto group"
                onDoubleClick={() => {
                  setMainWindowClosed(false);
                  setMainWindowMinimized(false);
                  setMainWindowZ(maxZIndex + 1);
                  setMaxZIndex(prev => prev + 1);
                }}
              >
                <Settings size={36} className="text-white drop-shadow-md group-active:text-blue-300" />
                <span className="text-white text-[11px] font-bold text-center leading-tight [text-shadow:1px_1px_1px_rgba(0,0,0,0.8)]">Keyword Manager</span>
              </div>

              <div
                className="flex flex-col items-center gap-1 w-[85px] p-2 cursor-pointer hover:bg-white/20 rounded pointer-events-auto group mt-4"
                onDoubleClick={() => {
                  setIsMindMapOpen(true);
                  const newZ = maxZIndex + 1;
                  setMindMapWindow(prev => ({ ...prev, isMinimized: false, zIndex: newZ }));
                  setMaxZIndex(newZ);
                }}
              >
                <Folder size={36} className="text-yellow-400 drop-shadow-md group-active:text-yellow-200 fill-yellow-400" />
                <span className="text-white text-[11px] font-bold text-center leading-tight [text-shadow:1px_1px_1px_rgba(0,0,0,0.8)]">Mind Map</span>
              </div>
            </div>

            {paramContextMenu.visible && (
              <div
                className="fixed bg-[#f0f0f0] border-2 border-white border-r-gray-600 border-b-gray-600 shadow-lg z-[9999] w-48 py-1 flex flex-col text-xs"
                style={{ top: paramContextMenu.y, left: paramContextMenu.x }}
                onPointerDown={(e) => e.stopPropagation()}
                onClick={(e) => e.stopPropagation()}
                onContextMenu={(e) => { e.preventDefault(); e.stopPropagation(); }}
              >
                <div className="px-2 py-1 font-bold border-b border-gray-300 text-blue-900 mb-1">
                  {paramContextMenu.paramName}
                </div>

                <button className="text-left px-3 py-1 hover:bg-[#000080] hover:text-white flex items-center gap-2"
                  onClick={() => {
                    handleOpenNotesEditor(paramContextMenu.paramName);
                    setParamContextMenu(prev => ({ ...prev, visible: false }));
                  }}
                >
                  <FileText size={10} /> Open Note
                </button>

                <div className="border-t border-gray-300 my-1"></div>

                <button className="text-left px-3 py-1 hover:bg-[#000080] hover:text-white flex items-center gap-2"
                  onClick={() => {
                    const newName = window.prompt("Rename parameter:", paramContextMenu.paramName);
                    if (newName && newName !== paramContextMenu.paramName) {
                      updateParamProperty(paramContextMenu.nodeId, paramContextMenu.rowIdx, paramContextMenu.colIdx, 'label', newName);
                      if (selectedParameter === paramContextMenu.paramName) setSelectedParameter(newName);
                    }
                    setParamContextMenu(prev => ({ ...prev, visible: false }));
                  }}
                >
                  <Type size={10} /> Rename (F2)
                </button>

                <div className="border-t border-gray-300 my-1"></div>

                <div className="px-3 py-1 flex flex-col gap-1">
                  <span className="text-[10px] text-gray-600 font-bold">Background Color</span>
                  <div className="flex gap-1 flex-wrap">
                    {['#ffb3ba', '#ffdfba', '#ffffba', '#baffc9', '#bae1ff', 'transparent'].map(c => (
                      <button key={`bg-${c}`} className="w-5 h-5 rounded border border-gray-400 hover:scale-110 transition-transform cursor-pointer" style={{ backgroundColor: c === 'transparent' ? '#fff' : c }}
                        title={c}
                        onClick={() => {
                          updateParamProperty(paramContextMenu.nodeId, paramContextMenu.rowIdx, paramContextMenu.colIdx, 'bgColor', c === 'transparent' ? '' : c);
                          setParamContextMenu(prev => ({ ...prev, visible: false }));
                        }}
                      >
                        {c === 'transparent' && <span className="text-[8px] text-gray-400">X</span>}
                      </button>
                    ))}
                  </div>
                </div>

                <div className="px-3 py-1 flex flex-col gap-1">
                  <span className="text-[10px] text-gray-600 font-bold">Text Color</span>
                  <div className="flex gap-1 flex-wrap">
                    {['#000000', '#ff0000', '#0000ff', '#008000', '#800080', 'inherit'].map(c => (
                      <button key={`text-${c}`} className="w-5 h-5 rounded border border-gray-400 hover:scale-110 transition-transform cursor-pointer" style={{ backgroundColor: c === 'inherit' ? '#ccc' : c }}
                        title={c}
                        onClick={() => {
                          updateParamProperty(paramContextMenu.nodeId, paramContextMenu.rowIdx, paramContextMenu.colIdx, 'textColor', c === 'inherit' ? '' : c);
                          setParamContextMenu(prev => ({ ...prev, visible: false }));
                        }}
                      >
                        {c === 'inherit' && <span className="text-[8px] text-gray-400">A</span>}
                      </button>
                    ))}
                  </div>
                </div>

                <div className="border-t border-gray-300 my-1"></div>
                <button className="text-left px-3 py-1 hover:bg-[#000080] hover:text-white flex items-center gap-2"
                  onClick={() => {
                    const tag = window.prompt("Enter tag name:");
                    if (tag) {
