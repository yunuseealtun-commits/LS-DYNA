        if (windowRef.current) {
          if (width) windowRef.current.style.width = typeof width === 'number' ? `${width}px` : width;
          if (height) windowRef.current.style.height = typeof height === 'number' ? `${height}px` : height;
        }
      }, []);

      const handlePointerDown = (e) => {

          const newX = e.clientX - dragOffset.x;
          const newY = e.clientY - dragOffset.y;
          const clampedX = Math.max(0, Math.min(window.innerWidth - 100, newX));
          const clampedY = Math.max(0, Math.min(window.innerHeight - 50, newY));
          setPos({ x: clampedX, y: clampedY });
        }
      };
      const handlePointerUp = (e) => {
        setIsDragging(false);
        e.target.releasePointerCapture(e.pointerId);
      };

      if (isMinimized) return null;

      const [maxDims, setMaxDims] = useState({ w: window.innerWidth, h: window.innerHeight - 30 });
      useEffect(() => {
        const handleResize = () => setMaxDims({ w: window.innerWidth, h: window.innerHeight - 30 });
        window.addEventListener('resize', handleResize);
        return () => window.removeEventListener('resize', handleResize);
      }, []);

      const windowStyle = isMaximized
        ? { left: 0, top: 0, width: `${maxDims.w}px`, height: `${maxDims.h}px`, zIndex, minWidth: 200 }
        : { left: pos.x, top: pos.y, zIndex, minWidth: 200, minHeight, maxHeight };

      return (
        <div
          ref={windowRef}
          className={`absolute flex flex-col bg-[#f0f0f0] border-2 border-white border-r-gray-500 border-b-gray-500 shadow-xl overflow-hidden ${isMaximized ? '' : 'resize'}`}
          style={windowStyle}
          onMouseDown={onFocus}
        >
          <div
            className="bg-gradient-to-r from-[#000080] to-[#1084d0] px-2 py-1 flex justify-between items-center select-none text-white cursor-pointer"
            onPointerDown={handlePointerDown}
            onPointerMove={handlePointerMove}
            onPointerUp={handlePointerUp}
          >
            <span className="font-bold tracking-wide text-sm flex items-center gap-2" >
              {title}
            </span>
            < div className="flex gap-1" onPointerDown={e => e.stopPropagation()} >
              {onMinimize && (
                <button onClick={onMinimize} className="w-4 h-4 bg-[#c0c0c0] border border-white border-r-gray-600 border-b-gray-600 flex items-center justify-center text-black font-bold text-xs leading-none active:border-gray-600 active:border-r-white active:border-b-white" > _ </button>
              )}
              {onMaximize && (
                <button onClick={onMaximize} className="w-4 h-4 bg-[#c0c0c0] border border-white border-r-gray-600 border-b-gray-600 flex items-center justify-center text-black font-bold text-xs leading-none active:border-gray-600 active:border-r-white active:border-b-white" > <Square size={8} /></button >
              )}
              {onClose && (
                <button onClick={onClose} className="w-4 h-4 bg-[#c0c0c0] border border-white border-r-gray-600 border-b-gray-600 flex items-center justify-center text-black font-bold text-xs leading-none active:border-gray-600 active:border-r-white active:border-b-white" >
                  <X size={12} />
                </button>
              )}
            </div>
          </div>
          < div className="flex-1 flex flex-col overflow-hidden min-h-0" >
            {children}
          </div>
        </div>
      );
    };

    // ================= TASKBAR COMPONENT =================
    const TaskBar = ({ windows, onWindowClick }) => {
      const [time, setTime] = useState(new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }));

      useEffect(() => {
        const timer = setInterval(() => setTime(new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })), 1000);
        return () => clearInterval(timer);
      }, []);

      return (
        <div className="absolute bottom-0 left-0 right-0 h-[30px] bg-[#c0c0c0] border-t-2 border-white flex justify-between items-center px-1 z-[99999]">
          <div className="flex gap-1 overflow-x-auto h-full items-center py-1">
            <button className="flex items-center gap-1 px-2 h-full bg-[#c0c0c0] border-2 border-white border-r-gray-600 border-b-gray-600 active:border-gray-600 active:border-r-white active:border-b-white font-bold mr-2">
              <span className="text-blue-800 italic pr-1">Start</span>
            </button>
            <div className="w-[2px] h-full border-l border-gray-500 border-r border-white mx-1"></div>
            {windows.map(win => (
              <button
                key={win.id}
                onClick={() => onWindowClick(win.id)}
                className={`flex items-center gap-1 px-2 h-full min-w-[120px] max-w-[150px] truncate text-xs ${!win.isMinimized && win.isFocused
                  ? 'bg-[#d0d0d0] border-2 border-gray-600 border-r-white border-b-white shadow-inner font-bold'
                  : 'bg-[#c0c0c0] border-2 border-white border-r-gray-600 border-b-gray-600 hover:bg-[#d0d0d0]'
                  }`}
              >
                {win.icon}
                <span className="truncate">{win.title}</span>
              </button>
            ))}
          </div>
          <div className="flex items-center h-full py-1">
            <div className="h-full px-2 flex items-center border-2 border-gray-600 border-r-white border-b-white shadow-inner text-xs bg-[#c0c0c0]">
              {time}
            </div>
          </div>
        </div>
      );
    };

    // ================= RENDER TREE ITEM =================
    const TreeItem = ({ item, level = 0 }) => {
      const {
        expandedNodes, selectedNode, renamingNodeId, contextMenu, setContextMenu,
        setSelectedNode, handleSelect, dragOverInfo, setDragOverInfo,
        handleDragStart, handleDragOver, handleDrop, toggleNode,
        renameText, setRenameText, handleRenameSubmit, findNodeById
      } = React.useContext(AppContext);

      const isExpanded = expandedNodes[item.id];
      const isSelected = selectedNode === item.id;
      const isRenaming = renamingNodeId === item.id;

      const onContextMenu = (e) => {
        e.preventDefault();
        e.stopPropagation();
        setContextMenu({ visible: true, x: e.pageX, y: e.pageY, nodeId: item.id });
        setSelectedNode(item.id);
      };



      const handleRowPointerDown = (e) => {
        if (e.target.closest('button')) return; // Ignore expand clicks
        if (e.target.closest('input')) return; // Ignore inputs

        if (isRenaming) setRenamingNodeId(null);

        // Sadece seçme işlemi yap, açma işlemi tıkla değil
        handleSelect(item);
      };

      return (
        <div className="relative font-mono text-sm select-none" onContextMenu={onContextMenu} >
          {dragOverInfo?.id === item.id && dragOverInfo.position === 'before' && <div className="absolute top-0 left-0 right-0 h-0.5 bg-blue-500 z-10" />}
          {dragOverInfo?.id === item.id && dragOverInfo.position === 'after' && <div className="absolute bottom-0 left-0 right-0 h-0.5 bg-blue-500 z-10" />}
          <div
            className={`flex items-center hover:bg-blue-50 cursor-pointer py-[2px] ${isSelected ? 'bg-blue-100 border border-dotted border-blue-400' : 'border border-transparent'} ${dragOverInfo?.id === item.id && dragOverInfo.position === 'inside' ? 'bg-blue-200' : ''}`}
            onPointerDown={handleRowPointerDown}
            style={{ paddingLeft: `${level * 20}px` }}
            draggable
            onDragStart={(e) => handleDragStart(e, item.id)}
            onDragOver={(e) => {
              e.preventDefault();
              e.stopPropagation();
              const rect = e.currentTarget.getBoundingClientRect();
              const y = e.clientY - rect.top;
              let position = 'inside';
              if (item.type === 'group') {
                if (y < rect.height * 0.25) position = 'before';
                else if (y > rect.height * 0.75) position = 'after';
              } else {
                if (y < rect.height / 2) position = 'before';
                else position = 'after';
              }
              setDragOverInfo({ id: item.id, position });
              handleDragOver(e);
            }}
            onDragLeave={() => setDragOverInfo(null)}
            onDrop={(e) => handleDrop(e, item.id, dragOverInfo?.position)}
          >
            <div className="flex items-center w-full" >
              {
                item.type === 'group' ? (
                  <button
                    className="w-4 h-4 mr-1 flex items-center justify-center border border-gray-500 bg-white shadow-sm"
                    onPointerDown={(e) => {
                      e.stopPropagation();
                      toggleNode(item.id);
                    }}
                  >
                    {isExpanded ? <Minus size={10} className="text-black" /> : <Plus size={10} className="text-black" />}
                  </button>
                ) : <div className="w-4 h-4 mr-1" > </div>}

              <span className="mr-1.5 text-yellow-600" >
                {item.type === 'group' ? <Folder size={14} fill="currentColor" className="text-yellow-500" /> : <FileText size={14} className="text-gray-500" />}
              </span>
              {
                isRenaming ? (
                  <input
                    type="text"
                    value={renameText}
                    autoFocus
                    onChange={(e) => setRenameText(e.target.value)
                    }
                    onKeyDown={(e) => {
                      if (e.key === 'Enter') handleRenameSubmit();
                      if (e.key === 'Escape') setRenamingNodeId(null);
                    }}
                    onBlur={handleRenameSubmit}
                    className="border border-blue-500 px-1 outline-none font-mono text-sm shadow-inner w-[200px]"
                    onClick={(e) => e.stopPropagation()}
                  />
                ) : (
                  <span
                    draggable
                    onDragStart={(e) => {
                      e.stopPropagation();
                      handleDragStart(e, item.id);
                    }}
                    onDragOver={(e) => {
                      e.preventDefault();
                      e.stopPropagation();
                      const rect = e.currentTarget.getBoundingClientRect();
                      const y = e.clientY - rect.top;
                      let position = 'inside';
                      if (item.type === 'group') {
                        if (y < rect.height * 0.25) position = 'before';
                        else if (y > rect.height * 0.75) position = 'after';
                      } else {
                        if (y < rect.height / 2) position = 'before';
                        else position = 'after';
                      }
                      setDragOverInfo({ id: item.id, position });
                      handleDragOver(e);
                    }}
                    onDragLeave={() => setDragOverInfo(null)}
                    onDrop={(e) => {
                      e.stopPropagation();
                      handleDrop(e, item.id, dragOverInfo?.position);
                    }}
                    className={`px-1 ${isSelected && item.color === '#000000' ? 'bg-blue-600 text-white' : ''} ${isSelected && item.color !== '#000000' ? 'font-bold' : ''}`}
                    style={{ color: isSelected && item.color === '#000000' ? 'white' : item.color }}
                  >
                    {item.name}
                  </span>
                )}
            </div>
          </div>

          {
            item.children && isExpanded && (
              <div className="relative" >
                <div className="absolute border-l border-dotted border-gray-400 h-full" style={{ left: `${(level * 20) + 7}px`, top: 0 }
                } />
                {item.children.map((child) => <TreeItem key={child.id} item={child} level={level + 1} />)}
              </div>
            )}
        </div>
      );
    };


    // ================= INPUT FORM COMPONENT =================
    const InputFormView = ({ editingNode, onClose }) => {
      const {
        parameterNotes, setParameterNotes, setIsEditorOpen, setTempNote,
        paramContextMenu, setParamContextMenu, miniQuillModules, setTreeData,
        selectedParameter, setSelectedParameter
      } = React.useContext(AppContext);

      const hasData = editingNode?.rows && editingNode.rows.length > 0;

      return (
        <div className="flex-1 bg-[#f0f0f0] flex flex-col h-full font-sans text-xs overflow-hidden" >
          {/* Form Top Bar */}
          < div className="flex justify-between items-start mb-2 shrink-0" >
            <div className="flex gap-4" >
              <label className="flex items-center gap-1 cursor-pointer" > <input type="checkbox" /> Use * Parameter </label>
              < label className="flex items-center gap-1 cursor-pointer" > <input type="checkbox" /> Comment </label>
            </div>
            < div className="flex flex-col items-center" >
              <span className="text-[10px] text-gray-700" > (Subsys: 1 C: \Users\Desktop\LS - DYNA_File.k)</span>
              < span className="font-bold text-sm mt-1" >* {editingNode.name.replace(/^\*/, '')}(1) </span>
            </div>
            < div className="flex gap-1 flex-wrap justify-end w-[400px]" >
              {
                ['CmpBase', 'Compare', 'Clear', 'Accept', 'Delete', 'Default', 'Save2Buf', 'Done', 'Setting'].map(btn => (
                  <button key={btn} onClick={() => btn === 'Done' ? onClose() : null}
                    className="px-2 py-0.5 bg-[#f0f0f0] border-2 border-white border-r-gray-600 border-b-gray-600 active:border-gray-600 active:border-r-white active:border-b-white" >
                    {btn}
                  </button>
                ))}
            </div>
          </div>

          < hr className="border-gray-400 mb-2 shrink-0" />

          {/* Dynamic Form Grid based on selected keyword data */}
          < div className="bg-[#f0f0f0] border border-gray-400 p-2 overflow-y-auto flex-1 relative min-h-0" >

            {
              hasData ? (
                <div className="grid grid-cols-[20px_repeat(8,_1fr)] gap-x-2 gap-y-3 items-center" >
                  {
                    editingNode.rows.map((row, rowIdx) => (
                      <React.Fragment key={rowIdx} >
                        <span className="font-bold text-gray-600 text-right pr-1 self-end mb-1" > {rowIdx + 1} </span>
                        {row.map((field, colIdx) => (
                          <div key={`${rowIdx}-${colIdx}`} className="flex flex-col gap-0.5 w-full" >
                            {
                              field.label ? (
                                <>
                                  <span
                                    className="text-blue-700 underline cursor-pointer hover:text-blue-900 text-[10px] truncate block hover:bg-blue-100 px-1 rounded transition-colors"
                                    title={field.label}
                                    onClick={(e) => {
                                      e.preventDefault();
                                      setSelectedParameter(field.label);
                                    }}
                                    onContextMenu={(e) => {
                                      e.preventDefault();
                                      e.stopPropagation();
                                      setParamContextMenu({ visible: true, x: e.pageX, y: e.pageY, paramName: field.label });
                                    }}
                                  > {field.label} </span>
                                  < input
                                    type="text"
                                    value={field.val}
                                    onChange={(e) => {
                                      const newVal = e.target.value;
                                      setTreeData(prev => {
                                        const updateFieldVal = (nodes) => {
                                          return nodes.map(n => {
                                            if (n.id === editingNode.id) {
                                              const newRows = [...n.rows];
                                              newRows[rowIdx] = [...newRows[rowIdx]];
                                              newRows[rowIdx][colIdx] = { ...newRows[rowIdx][colIdx], val: newVal };
                                              return { ...n, rows: newRows };
                                            }
                                            if (n.children) return { ...n, children: updateFieldVal(n.children) };
                                            return n;
                                          });
                                        };
                                        return updateFieldVal(prev);
                                      });
                                    }}
                                    className="border border-gray-400 bg-white h-[20px] px-1 text-blue-800 outline-none shadow-inner w-full text-[11px]"
                                  />
                                </>
                              ) : (
                                <div className="h-[20px] w-full" /> /* Empty Spacer Column */
                              )}
                          </div>
                        ))}

                        {/* Inject the "Optional Cards" radio for CONTROL_CONTACT exactly like image after row 2 */}
                        {
                          editingNode.name === 'CONTROL_CONTACT' && rowIdx === 1 && (
                            <div className="col-span-9 ml-8 my-2" >
                              <fieldset className="border border-gray-300 p-2 relative flex gap-4 text-[11px] bg-[#f0f0f0] inline-flex" >
                                <legend className="absolute -top-2 left-2 px-1 bg-[#f0f0f0] text-gray-700" > Active optional cards </legend>
                                < label className="flex items-center gap-1 cursor-pointer" > <input type="radio" name="opt" /> None </label>
                                < label className="flex items-center gap-1 cursor-pointer" > <input type="radio" name="opt" /> Opt1 </label>
                                < label className="flex items-center gap-1 cursor-pointer" > <input type="radio" name="opt" /> Opt12 </label>
                                < label className="flex items-center gap-1 cursor-pointer" > <input type="radio" name="opt" /> Opt123 </label>
                                < label className="flex items-center gap-1 cursor-pointer font-bold text-blue-800" > <input type="radio" name="opt" defaultChecked /> Opt1234 </label>
                                < label className="flex items-center gap-1 cursor-pointer" > <input type="radio" name="opt" /> Opt12345 </label>
                              </fieldset>
                            </div>
                          )
                        }
                      </React.Fragment>
                    ))}
                </div>
              ) : (
                <div className="flex h-full items-center justify-center text-gray-500 italic" > No parameters available for this keyword.</div>
              )}
          </div>

          {/* Bottom Text Area */}
          <div className="mt-2 h-[120px] border border-gray-400 bg-white shadow-inner p-2 overflow-y-auto font-sans shrink-0 text-[12px] relative group" >
            {
              selectedParameter ? (
                <>
                  <div className="flex justify-between items-center mb-1 pb-1 border-b border-gray-300" >
                    <div className="font-bold text-[#000080]" > {selectedParameter} Notes: </div>
                    <button
                      className="bg-blue-100 border border-gray-400 hover:bg-blue-200 px-2 py-0.5 text-[10px] rounded text-blue-800 shadow-sm flex items-center gap-1 cursor-pointer"
                      onClick={() => {
                        setTempNote(parameterNotes[selectedParameter] || '');
                        if (React.useContext(AppContext).handleOpenNotesEditor) {
                          React.useContext(AppContext).handleOpenNotesEditor(selectedParameter);
                        } else {
                          setIsEditorOpen(true);
                        }
                      }}
                    >
                      <FileText size={10} /> Tam Ekran Düzenle (Full Editor)
                    </button>
                  </div>
                  <div className="h-[75px] w-full" >
                    <ReactQuill
                      theme="snow"
                      value={parameterNotes[selectedParameter] || ''}
                      onChange={(val) => setParameterNotes(prev => ({ ...prev, [selectedParameter]: val }))}
                      className="h-[40px] border-none bg-white"
                      modules={miniQuillModules}
                      placeholder={`Enter quick notes for ${selectedParameter}...`}
                    />
                  </div>
                </>
              ) : (
                <div className="text-gray-500 italic font-mono h-full flex items-center justify-center bg-gray-50" > $# Select a parameter to view or quick-edit its notes...</div>
              )}
          </div>
        </div>
      );
    };


    const KeywordManager = () => {
      const [activeTab, setActiveTab] = useState('Keyword Tree');
      const [selectedNode, setSelectedNode] = useState(null);
      const [filterText, setFilterText] = useState('');
      const [clipboard, setClipboard] = useState(null);

      // Right-click context menu state
      const [contextMenu, setContextMenu] = useState({ visible: false, x: 0, y: 0, nodeId: null });

      // Window Management State
      // openForms: { id, node, pos: {x,y}, zIndex, isMinimized, isMaximized }
      const [openForms, setOpenForms] = useState([]);

      const [mainWindowPos, setMainWindowPos] = useState({ x: 20, y: 20 });
      const [mainWindowZ, setMainWindowZ] = useState(10);
      const [mainWindowMinimized, setMainWindowMinimized] = useState(false);
      const [mainWindowMaximized, setMainWindowMaximized] = useState(false);
      const [maxZIndex, setMaxZIndex] = useState(10);

      // Notes Editor Management
      const [notesEditorWindow, setNotesEditorWindow] = useState({
        isMinimized: false,
        isMaximized: false,
        zIndex: 11
      });

      // LS-DYNA Keyword Structure Data mapped perfectly to the requested input parameters
      const [treeData, setTreeData] = useState(initialTreeData);

      const [expandedNodes, setExpandedNodes] = useState({
        'control': true, 'database': false, 'boundary': false, 'contact': true,
        'part': true, 'mat': false, 'section': false, 'eos': false, 'hourglass': false, 'initial': false, 'element': false
      });

      // Parameter Notes State
      const [parameterNotes, setParameterNotes] = useState({});
      const [selectedParameter, setSelectedParameter] = useState(null);
      const [isEditorOpen, setIsEditorOpen] = useState(false);
      const [tempNote, setTempNote] = useState('');
      const [paramContextMenu, setParamContextMenu] = useState({ visible: false, x: 0, y: 0, paramName: null });

      const handleOpenNotesEditor = useCallback((paramName) => {
        setSelectedParameter(paramName);
        setTempNote(parameterNotes[paramName] || '');
        setIsEditorOpen(true);
        const newZ = maxZIndex + 1;
        setMaxZIndex(newZ);
        setNotesEditorWindow(prev => ({ ...prev, isMinimized: false, zIndex: newZ }));
      }, [maxZIndex, parameterNotes]);

      // Undo/Redo History for structural tree changes
      const undoStack = useRef([]);
      const redoStack = useRef([]);

      const commitHistory = useCallback((stateToCommit) => {
        undoStack.current.push(JSON.parse(JSON.stringify(stateToCommit)));
        if (undoStack.current.length > 50) undoStack.current.shift();
        redoStack.current = [];
      }, []);

      const handleUndo = useCallback(() => {
        if (undoStack.current.length > 0) {
          setTreeData(prev => {
            redoStack.current.push(JSON.parse(JSON.stringify(prev)));
            return undoStack.current.pop();
          });
        }
      }, []);

      const handleRedo = useCallback(() => {
        if (redoStack.current.length > 0) {
          setTreeData(prev => {
            undoStack.current.push(JSON.parse(JSON.stringify(prev)));
            return redoStack.current.pop();
          });
        }
      }, []);

      const [isSaving, setIsSaving] = useState(false);
      const [saveMessage, setSaveMessage] = useState('');

      // Fetch data on load
      useEffect(() => {
        fetch('http://localhost:8000/api/data')
          .then(res => {
            if (!res.ok) throw new Error('No existing db, using default keywords.');
            return res.json();
          })
          .then(data => {
            if (data.treeData) setTreeData(data.treeData);
            if (data.parameterNotes) setParameterNotes(data.parameterNotes);
            if (data.expandedNodes) setExpandedNodes(data.expandedNodes);
          })
          .catch(err => {
            console.log('DB Load Info:', err.message);
            const local = localStorage.getItem('lsdyna_notes_db');
            if (local) {
              const data = JSON.parse(local);
              if (data.treeData) setTreeData(data.treeData);
              if (data.parameterNotes) setParameterNotes(data.parameterNotes);
              if (data.expandedNodes) setExpandedNodes(data.expandedNodes);
            }
          });
      }, []);

      const isInitialDbLoad = React.useRef(true);

      const saveDatabase = useCallback((silent = false) => {
        if (!silent) {
          setIsSaving(true);
          setSaveMessage('Saving...');
        }
        const stateObj = { treeData, parameterNotes, expandedNodes };
        fetch('http://localhost:8000/api/data', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(stateObj)
        })
          .then(res => res.json())
          .then(data => {
            localStorage.setItem('lsdyna_notes_db', JSON.stringify(stateObj));
            if (!silent) {
              setSaveMessage('Saved Successfully!');
              setTimeout(() => setSaveMessage(''), 3000);
            }
          })
          .catch(err => {
            localStorage.setItem('lsdyna_notes_db', JSON.stringify(stateObj));
            if (!silent) {
              setSaveMessage(`Local Saved`);
              setTimeout(() => setSaveMessage(''), 4000);
            }
          })
          .finally(() => {
            if (!silent) setIsSaving(false);
          });
      }, [treeData, parameterNotes, expandedNodes]);

      // Debounced Auto-save
      useEffect(() => {
        if (isInitialDbLoad.current) {
          isInitialDbLoad.current = false;
          return;
        }
        const timer = setTimeout(() => {
          saveDatabase(true);
        }, 1500);
        return () => clearTimeout(timer);
      }, [treeData, parameterNotes, expandedNodes, saveDatabase]);

      // ================= COPY & PASTE (Ctrl+C / Ctrl+V) =================
      const findNodeById = useCallback((nodes, id) => {
        for (const node of nodes) {
          if (node.id === id) return node;
          if (node.children) {
            const found = findNodeById(node.children, id);
            if (found) return found;
          }
        }
        return null;
      }, []);

      const getTotalItemsCount = useCallback((nodes) => {
        return nodes.reduce((count, node) => {
          let current = node.type === 'item' ? 1 : 0;
          let childrenCount = node.children ? getTotalItemsCount(node.children) : 0;
          return count + current + childrenCount;
        }, 0);
      }, []);

      // Name Editing State (Rename)
      const [renamingNodeId, setRenamingNodeId] = useState(null);
      const [renameText, setRenameText] = useState('');

      const handleStartRename = useCallback((id) => {
        const node = findNodeById(treeData, id);
        if (node) {
          setRenamingNodeId(id);
          setRenameText(node.name);
          setContextMenu({ visible: false, x: 0, y: 0, nodeId: null });
        }
      }, [treeData, findNodeById]);

      // Drag and Drop State and Handlers
      const [draggedNodeId, setDraggedNodeId] = useState(null);
      const [dragOverInfo, setDragOverInfo] = useState(null);

      const handleDragStart = useCallback((e, id) => {
        e.stopPropagation();
        setDraggedNodeId(id);
        if (e.dataTransfer) {
          e.dataTransfer.effectAllowed = 'move';
          e.dataTransfer.setData('text/plain', id); // required for Firefox
        }
      }, []);

      const handleDragOver = useCallback((e) => {
        e.preventDefault();
        if (e.dataTransfer) e.dataTransfer.dropEffect = 'move';
      }, []);

      const handleDrop = useCallback((e, targetId, position = 'inside') => {
        e.preventDefault();
        e.stopPropagation();

        if (!draggedNodeId || draggedNodeId === targetId) {
          setDragOverInfo(null);
          return;
        }

        setTreeData(prev => {
          let draggedNode = null;
          // First, find and extract the dragged node accurately without losing children
          const extractNode = (nodes) => {
            let extracted = null;
            let remaining = nodes.filter(n => {
              if (n.id === draggedNodeId) {
                extracted = { ...n };
                return false;
              }
              return true;
            }).map(n => {
              if (n.children) {
                const result = extractNode(n.children);
                if (result.extracted) extracted = result.extracted;
                return { ...n, children: result.remaining };
              }
              return n;
            });
            return { extracted, remaining };
          };

          const extractResult = extractNode(prev);
          let treeWithoutDragged = extractResult.remaining;
          draggedNode = extractResult.extracted;
          if (!draggedNode) return prev;

          let inserted = false;
          const insertNode = (nodes) => {
            let newNodes = [];
            for (const n of nodes) {
              if (n.id === targetId) {
                inserted = true;
                if (position === 'inside' && n.type === 'group') {
                  newNodes.push({ ...n, children: [...(n.children || []), draggedNode] });
                  setExpandedNodes(eState => ({ ...eState, [n.id]: true }));
                } else if (position === 'before') {
                  newNodes.push(draggedNode, n);
                } else if (position === 'after') {
                  newNodes.push(n, draggedNode);
                } else {
                  if (n.type === 'group') {
                    newNodes.push({ ...n, children: [...(n.children || []), draggedNode] });
                  } else {
                    newNodes.push(n, draggedNode);
                  }
                }
              } else {
                let newNode = { ...n };
                if (n.children) {
                  newNode.children = insertNode(n.children);
                }
                newNodes.push(newNode);
              }
            }
            return newNodes;
          };

          const finalTree = insertNode(treeWithoutDragged);
          if (inserted) commitHistory(prev);
          return inserted ? finalTree : prev;
        });
        setDraggedNodeId(null);
        setDragOverInfo(null);
      }, [draggedNodeId]);

      // Quill Editor Configuration
      useEffect(() => {
        if (typeof window !== 'undefined' && window.Quill && window.quillTableUI) {
          try {
            window.Quill.register({ 'modules/tableUI': window.quillTableUI.default }, true);
          } catch (e) { console.error("TableUI failed to load", e); }
        }
      }, []);

      // Expanded Quill modules config
      const quillModules = useMemo(() => ({
        toolbar: [
          [{ 'header': [1, 2, 3, 4, 5, 6, false] }],
          [{ 'font': [] }],
          [{ 'size': ['small', false, 'large', 'huge'] }],
          ['bold', 'italic', 'underline', 'strike'],
          [{ 'color': [] }, { 'background': [] }],
          [{ 'script': 'sub' }, { 'script': 'super' }],
          [{ 'list': 'ordered' }, { 'list': 'bullet' }, { 'indent': '-1' }, { 'indent': '+1' }],
          [{ 'align': [] }],
          ['table', 'link', 'image', 'video', 'formula'],
          ['clean']
        ],
        table: true,
        tableUI: true
      }), []);

      const miniQuillModules = useMemo(() => ({ toolbar: false }), []);

      useEffect(() => {
        const handleKeyDown = (e) => {
          if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;

          if (e.ctrlKey && e.key.toLowerCase() === 'z') {
            e.preventDefault();
            handleUndo();
          } else if (e.ctrlKey && e.key.toLowerCase() === 'y') {
            e.preventDefault();
            handleRedo();
          } else if (e.key === 'F2' && selectedNode) {
            handleStartRename(selectedNode);
            e.preventDefault();
          } else if (e.ctrlKey && e.key.toLowerCase() === 'c' && selectedNode) {
            const nodeToCopy = findNodeById(treeData, selectedNode);
            if (nodeToCopy) setClipboard(cloneNode(nodeToCopy));
          } else if (e.ctrlKey && e.key === 'v' && clipboard) {
            pasteNode(clipboard);
          }
        };
        document.addEventListener('keydown', handleKeyDown);
        return () => document.removeEventListener('keydown', handleKeyDown);
      }, [selectedNode, clipboard, treeData, findNodeById, handleStartRename]);

      // ================= ADD, DELETE, PASTE LOGIC =================
      const pasteNode = (copiedNode) => {
        const newNode = cloneNode(copiedNode);
        setTreeData(prev => {
          commitHistory(prev);
          if (!selectedNode) return [...prev, newNode];

          const insertIntoTree = (nodes) => {
            let newNodes = [];
            for (const node of nodes) {
              if (node.id === selectedNode) {
                if (node.type === 'group') {
                  newNodes.push({ ...node, children: [...(node.children || []), newNode] });
                  setExpandedNodes(e => ({ ...e, [node.id]: true }));
                } else {
                  newNodes.push(node, newNode);
                }
              } else if (node.children) {
                newNodes.push({ ...node, children: insertIntoTree(node.children) });
              } else {
                newNodes.push(node);
              }
            }
            return newNodes;
          };
          return insertIntoTree(prev);
        });
      };

      const handleAddFolder = (targetParentId) => {
        const newFolder = { id: generateId(), name: 'NEW_FOLDER', type: 'group', color: '#000000', children: [] };
        setTreeData(prev => {
          commitHistory(prev);
          if (!targetParentId) return [...prev, newFolder];

          const insertIntoTree = (nodes) => {
            let newNodes = [];
            for (const node of nodes) {
              if (node.id === targetParentId) {
                if (node.type === 'group') {
                  newNodes.push({ ...node, children: [...(node.children || []), newFolder] });
                  setExpandedNodes(e => ({ ...e, [node.id]: true }));
                } else {
                  newNodes.push(node, newFolder);
                }
              } else if (node.children) {
                newNodes.push({ ...node, children: insertIntoTree(node.children) });
              } else {
                newNodes.push(node);
              }
            }
            return newNodes;
          };
          return insertIntoTree(prev);
        });
        setRenamingNodeId(newFolder.id);
        setRenameText('NEW_FOLDER');
        setContextMenu({ visible: false, x: 0, y: 0, nodeId: null });
      };

      const handleAddNode = (targetParentId) => {
        let newName = 'NEW_KEYWORD';
        const idToUse = typeof targetParentId === 'string' ? targetParentId : selectedNode;

        // Auto-prefix logic based on selected node's context
        if (idToUse) {
          // Find the selected node to determine its parent or its own name
          const selected = findNodeById(treeData, idToUse);
          if (selected) {
            if (selected.type === 'group') {
              newName = selected.name.replace(/^\*/, '') + '_';
            } else {
              // If it's an item, try to find its parent to get the prefix
              const findParent = (nodes, id, parent = null) => {
                for (const node of nodes) {
                  if (node.id === id) return parent;
                  if (node.children) {
                    const p = findParent(node.children, id, node);
                    if (p) return p;
                  }
                }
                return null;
              };
              const parent = findParent(treeData, idToUse);
              if (parent) {
                newName = parent.name.replace(/^\*/, '') + '_';
              }
            }
          }
        }

        const emptyRow = Array(8).fill(null).map(() => ({ label: 'NEW', val: '' }));
        const newNodeItem = { id: generateId(), name: newName, type: 'item', color: '#000000', rows: initRows };

        setTreeData(prev => {
          commitHistory(prev);
          if (!idToUse) return [...prev, newNodeItem];
          const insertIntoTree = (nodes) => {
            let newNodes = [];
            for (const node of nodes) {
              if (node.id === idToUse) {
                if (node.type === 'group') {
                  newNodes.push({ ...node, children: [...(node.children || []), newNodeItem] });
                  setExpandedNodes(e => ({ ...e, [node.id]: true }));
                } else {
                  newNodes.push(node, newNodeItem);
                }
              } else if (node.children) {
                newNodes.push({ ...node, children: insertIntoTree(node.children) });
              } else {
                newNodes.push(node);
              }
            }
            return newNodes;
          };
          return insertIntoTree(prev);
        });

        setRenamingNodeId(newNodeItem.id);
        setRenameText(newName);
        setContextMenu({ visible: false, x: 0, y: 0, nodeId: null });
        setSelectedNode(newNodeItem.id);
      };

      const handleDeleteNode = (targetId) => {
        const idToUse = typeof targetId === 'string' ? targetId : selectedNode;
        if (!idToUse) return;

        const nodeToDelete = findNodeById(treeData, idToUse);
        if (!nodeToDelete) return;

        const getNames = (node, names = []) => {
          if (node.type !== 'group') names.push(node.name);
          if (node.children) node.children.forEach(c => getNames(c, names));
          return names;
        };

        const affectedNames = getNames(nodeToDelete);
        const confirmMsg = `Are you sure you want to delete ${nodeToDelete.type === 'group' ? 'this folder and ' : ''}these items?\n\n`
          + affectedNames.slice(0, 10).join('\n')
          + (affectedNames.length > 10 ? '\n...and more' : '');

        if (!window.confirm(confirmMsg)) return;

        const deleteFromTree = (nodes) => {
          return nodes.filter(n => n.id !== idToUse).map(n => ({
            ...n,
            children: n.children ? deleteFromTree(n.children) : undefined
          }));
        };
        setTreeData(prev => {
          commitHistory(prev);
          return deleteFromTree(prev);
        });
        if (selectedNode === idToUse) setSelectedNode(null);
        setContextMenu({ visible: false, x: 0, y: 0, nodeId: null });
      };

      const handleRenameSubmit = useCallback(() => {
        if (renamingNodeId && renameText.trim()) {
          setTreeData(prev => {
            const renameInTree = (nodes) => {
              return nodes.map(node => {
                if (node.id === renamingNodeId) {
                  if (node.name !== renameText.trim()) commitHistory(prev);
                  return { ...node, name: renameText.trim() };
                }
                if (node.children) return { ...node, children: renameInTree(node.children) };
                return node;
              });
            };
            return renameInTree(prev);
          });
          setRenamingNodeId(null);
          setRenameText('');
        } else {
          setRenamingNodeId(null);
          setRenameText('');
        }
      }, [renamingNodeId, renameText, setTreeData, commitHistory]);

      // ================= RIGHT CLICK COLOR MENU =================
      const changeNodeColor = (color) => {
        const updateColor = (nodes) => {
          return nodes.map(n => {
            if (n.id === contextMenu.nodeId) return { ...n, color };
            if (n.children) return { ...n, children: updateColor(n.children) };
            return n;
          });
        };
        setTreeData(prev => {
          commitHistory(prev);
          return updateColor(prev);
        });
        setContextMenu({ visible: false, x: 0, y: 0, nodeId: null });
      };

      useEffect(() => {
        const closeMenu = () => {
          setContextMenu(prev => ({ ...prev, visible: false }));
          setParamContextMenu(prev => ({ ...prev, visible: false }));
        };
        document.addEventListener('pointerdown', closeMenu);
        return () => document.removeEventListener('pointerdown', closeMenu);
      }, []);

      // ================= FILTERING =================
      const filterNodes = (nodes, text) => {
        if (!text) return nodes;
        return nodes.reduce((acc, node) => {
          const matchesNode = node.name.toLowerCase().includes(text.toLowerCase());
          const filteredChildren = node.children ? filterNodes(node.children, text) : undefined;

          if (matchesNode || (filteredChildren && filteredChildren.length > 0)) {
            acc.push({ ...node, children: node.children ? (filteredChildren || []) : undefined });
          }
          return acc;
        }, []);
      };
      const filteredData = useMemo(() => filterNodes(treeData, filterText), [filterText, treeData]);

      const toggleNode = (nodeId) => {
        setExpandedNodes(prev => {
          const newState = { ...prev, [nodeId]: !prev[nodeId] };
          return newState;
        });
      };

      const handleSelect = (node) => {
        setSelectedNode(node.id);
      };
      const handleOpenForm = (node) => {
        if (node.type !== 'group') {
          // Check if already open
          if (openForms.some(f => f.node.id === node.id)) {
            // Bring to front
            const newZ = maxZIndex + 1;
            setMaxZIndex(newZ);
            setOpenForms(prev => prev.map(f => f.node.id === node.id ? { ...f, zIndex: newZ } : f));
            return;
          }

          const newZ = maxZIndex + 1;
          setMaxZIndex(newZ);
          const newId = Date.now().toString() + Math.random().toString(36).substr(2, 5);
          const offset = (openForms.length * 30) % 300;
          setOpenForms(prev => [...prev, {
            id: newId,
            node,
            pos: { x: 100 + offset, y: 100 + offset },
            zIndex: newZ,
            isMinimized: false,
            isMaximized: false
          }]);
        }
      };

      // Taskbar items generation
      const getTaskbarWindows = () => {
        const windows = [];
        windows.push({
          id: 'main',
          title: 'Keyword Manager 98',
          icon: <Settings size={12} className="text-blue-800" />,
          isMinimized: mainWindowMinimized,
          isFocused: mainWindowZ === maxZIndex
        });

        openForms.forEach(form => {
          windows.push({
            id: form.id,
            title: `*${form.node.name.replace(/^\*/, '')}`,
            icon: <FileText size={12} className="text-gray-700" />,
            isMinimized: form.isMinimized,
            isFocused: form.zIndex === maxZIndex
          });
        });

        if (isEditorOpen) {
          windows.push({
            id: 'editor',
            title: `Notes: ${selectedParameter}`,
            icon: <FileText size={12} className="text-blue-600" />,
            isMinimized: notesEditorWindow.isMinimized,
            isFocused: notesEditorWindow.zIndex === maxZIndex
          });
        }

        return windows;
      };

      const handleTaskbarClick = (id) => {
        const newZ = maxZIndex + 1;
        setMaxZIndex(newZ);

        if (id === 'main') {
          setMainWindowMinimized(prev => mainWindowZ === maxZIndex && !prev ? true : false);
          setMainWindowZ(newZ);
        } else if (id === 'editor') {
          setNotesEditorWindow(prev => ({
            ...prev,
            isMinimized: prev.zIndex === maxZIndex && !prev.isMinimized ? true : false,
            zIndex: newZ
          }));
        } else {
          setOpenForms(prev => prev.map(f => {
            if (f.id === id) {
              return {
                ...f,
                isMinimized: f.zIndex === maxZIndex && !f.isMinimized ? true : false,
                zIndex: newZ
              };
            }
            return f;
          }));
        }
      };

      const ctxValue = {
        treeData, setTreeData, parameterNotes, setParameterNotes,
        expandedNodes, setExpandedNodes, selectedNode, setSelectedNode,
        renamingNodeId, setRenamingNodeId, renameText, setRenameText,
        draggedNodeId, setDraggedNodeId, dragOverInfo, setDragOverInfo,
        clipboard, setClipboard, contextMenu, setContextMenu,
        openForms, setOpenForms, maxZIndex, setMaxZIndex,
        isEditorOpen, setIsEditorOpen, tempNote, setTempNote,
        paramContextMenu, setParamContextMenu, isSaving, setIsSaving,
        saveMessage, setSaveMessage, selectedParameter, setSelectedParameter,
        handleSelect, handleStartRename, handleDragStart, handleDragOver, handleDrop,
        toggleNode, handleRenameSubmit, handleOpenForm, handleOpenNotesEditor,
        handleAddFolder, handleAddNode, handleDeleteNode, changeNodeColor, findNodeById,
        miniQuillModules, quillModules
      };

      return (
        <AppContext.Provider value={ctxValue}>
          <div className="h-screen w-screen bg-teal-800 relative font-sans text-[13px] overflow-hidden" >

            {paramContextMenu.visible && (
              <div
                className="fixed bg-[#f0f0f0] border-2 border-white border-r-gray-600 border-b-gray-600 shadow-lg z-[9999] w-32 py-1 flex flex-col"
                style={{ top: paramContextMenu.y, left: paramContextMenu.x }}
                onPointerDown={(e) => e.stopPropagation()}
                onClick={(e) => e.stopPropagation()}
                onContextMenu={(e) => { e.preventDefault(); e.stopPropagation(); }}
              >
                <button className="text-left px-3 py-1 hover:bg-[#000080] hover:text-white flex items-center gap-2"
                  onClick={() => {
                    handleOpenNotesEditor(paramContextMenu.paramName);
                    setParamContextMenu({ visible: false, x: 0, y: 0, paramName: null });
                  }}
                >
                  <FileText size={10} /> Open Note
                </button>
              </div>
            )}

            {/* Context Menu for Right Click Color Selection */}
            {
              contextMenu.visible && (
                <div
                  className="fixed bg-[#f0f0f0] border-2 border-white border-r-gray-600 border-b-gray-600 shadow-lg z-[9999] w-32 py-1 flex flex-col"
                  style={{ top: contextMenu.y, left: contextMenu.x }}
                  onPointerDown={(e) => e.stopPropagation()}
                  onClick={(e) => e.stopPropagation()}
                  onContextMenu={(e) => { e.preventDefault(); e.stopPropagation(); }}
                >
                  <span className="px-3 py-1 text-xs font-bold border-b border-gray-300 text-gray-600" > Actions </span>
                  {
                    (contextMenu.nodeId && findNodeById(treeData, contextMenu.nodeId)?.type !== 'group') && (
                      <button className="text-left px-3 py-1 hover:bg-[#000080] hover:text-white flex items-center gap-2"
                        onClick={() => {
                          const node = findNodeById(treeData, contextMenu.nodeId);
                          if (node) handleOpenForm(node);
                          setContextMenu({ visible: false, x: 0, y: 0, nodeId: null });
                        }}
                      >
                        <FileText size={10} /> Open
                      </button>
                    )
                  }
                  {
                    (contextMenu.nodeId && findNodeById(treeData, contextMenu.nodeId)?.type === 'group') && (
                      <button className="text-left px-3 py-1 hover:bg-[#000080] hover:text-white flex items-center gap-2"
                        onClick={() => {
                          toggleNode(contextMenu.nodeId);
                          setContextMenu({ visible: false, x: 0, y: 0, nodeId: null });
                        }}
                      >
                        <Folder size={10} /> Expand/Collapse
                      </button>
                    )
                  }
                  {
                    (contextMenu.nodeId && findNodeById(treeData, contextMenu.nodeId)?.type === 'group') && (
                      <button className="text-left px-3 py-1 hover:bg-[#000080] hover:text-white flex items-center gap-2"
                        onClick={() => handleAddNode(contextMenu.nodeId)}
                      >
                        <FileText size={10} /> New Card
                      </button>
                    )
                  }
                  < button className="text-left px-3 py-1 hover:bg-[#000080] hover:text-white flex items-center gap-2"
                    onClick={() => handleStartRename(contextMenu.nodeId)}
                  >
                    <FileText size={10} /> Rename (F2)
                  </button>
                  < button className="text-left px-3 py-1 hover:bg-[#000080] hover:text-white flex items-center gap-2"
                    onClick={() => handleDeleteNode(contextMenu.nodeId)}
                  >
                    <X size={10} /> Delete
                  </button>
                  < span className="px-3 py-1 text-xs font-bold border-b border-gray-300 border-t mt-1 text-gray-600" > Renk Seç </span>
                  < button className="text-left px-3 py-1 hover:bg-[#000080] hover:text-white flex items-center gap-2" onClick={() => changeNodeColor('#000000')}> <Square size={10} fill="#000000" /> Varsayılan </button>
                  < button className="text-left px-3 py-1 hover:bg-[#000080] hover:text-white flex items-center gap-2" onClick={() => changeNodeColor('#ff0000')}> <Square size={10} fill="#ff0000" /> Kırmızı </button>
                  < button className="text-left px-3 py-1 hover:bg-[#000080] hover:text-white flex items-center gap-2" onClick={() => changeNodeColor('#0000ff')}> <Square size={10} fill="#0000ff" /> Mavi </button>
                  < button className="text-left px-3 py-1 hover:bg-[#000080] hover:text-white flex items-center gap-2" onClick={() => changeNodeColor('#008000')}> <Square size={10} fill="#008000" /> Yeşil </button>
                  < button className="text-left px-3 py-1 hover:bg-[#000080] hover:text-white flex items-center gap-2" onClick={() => changeNodeColor('#800080')}> <Square size={10} fill="#800080" /> Mor </button>
                </div>
              )}

            {/* Main Keyword Manager Window */}
            <DraggableWindow
              id="main"
              title={<><Settings size={14} /> Keyword Manager 98</ >}
              initialPos={mainWindowPos}
              zIndex={mainWindowZ}
              onFocus={() => { setMainWindowZ(maxZIndex + 1); setMaxZIndex(prev => prev + 1); }}
              width={450}
              height={800}
              isMinimized={mainWindowMinimized}
              onMinimize={() => setMainWindowMinimized(true)}
              isMaximized={mainWindowMaximized}
              onMaximize={() => setMainWindowMaximized(!mainWindowMaximized)}
            >
              <div className="flex flex-col h-full bg-[#f0f0f0]" >
                {/* Menu Bar */}
                < div className="flex px-1 py-0.5 border-b border-gray-400 text-black mb-1 justify-between items-center" >
                  <div className="flex" >
                    <span className="px-2 hover:bg-[#000080] hover:text-white cursor-pointer" > File </span>
                    < span className="px-2 hover:bg-[#000080] hover:text-white cursor-pointer" > Edit </span>
                    < span className="px-2 hover:bg-[#000080] hover:text-white cursor-pointer" > View </span>
                    < span className="px-2 hover:bg-[#000080] hover:text-white cursor-pointer" > Help </span>
                  </div>
                  < div className="flex items-center gap-2 pr-2" >
                    {saveMessage && <span className="text-xs text-[#000080] font-bold" > {saveMessage} </span>}
                    <button
                      className="px-2 bg-[#c0c0c0] border border-white border-r-gray-600 border-b-gray-600 text-[10px] py-[1px] active:border-gray-600 active:border-r-white active:border-b-white hover:bg-[#d0d0d0] font-bold shadow-sm"
                      onClick={saveDatabase}
                      disabled={isSaving}
                    >
                      {isSaving ? '...Saving' : 'Save Database'}
                    </button>
                  </div>
                </div>

                {/* Tab Bar */}
                <div className="flex px-2 pt-2 bg-[#f0f0f0]" >
                  {
                    ['Keyword Tree', 'Search Results'].map(tab => (
                      <button key={tab} onClick={() => setActiveTab(tab)}
                        className={`px-4 py-1 mr-[2px] border-t border-x border-gray-600 rounded-t-sm text-black ${activeTab === tab ? 'bg-[#f0f0f0] font-bold relative -mb-[2px] z-10 pb-1.5' : 'bg-[#d4d0c8] text-gray-600 hover:bg-[#e0e0e0] mt-1'}`}
                      >
                        {tab}
                      </button>
                    ))}
                </div>

                {/* Main Tree Area */}
                <div className="flex-1 border-t-2 border-white border-l-2 border-l-white border-r-2 border-r-gray-500 border-b-2 border-b-gray-500 m-2 p-3 flex flex-col gap-3 bg-[#f0f0f0] min-h-0" >
                  <div className="flex flex-col gap-1" >
                    <label className="text-gray-700 font-semibold text-xs" > Filter / Search Keywords: </label>
                    < div className="flex items-center gap-2" >
                      <div className="relative flex-1" >
                        <input type="text" className="w-full border-2 border-gray-500 border-r-white border-b-white bg-white px-2 py-1 text-sm shadow-inner outline-none focus:border-blue-800"
                          value={filterText} onChange={(e) => setFilterText(e.target.value)} placeholder="Type to filter..." />
                        <Search size={14} className="absolute right-2 top-1.5 text-gray-400" />
                      </div>
                    </div>
                  </div>

                  < div className="flex-1 border-2 border-gray-600 border-r-white border-b-white bg-white overflow-hidden flex flex-col shadow-inner" >
                    <div className="flex-1 overflow-y-auto p-2 bg-white" style={{ fontFamily: 'Tahoma, sans-serif' }}>
                      {filteredData.length > 0 ? filteredData.map((item) => <TreeItem key={item.id} item={item} />) : <div className="text-gray-400 italic p-2 text-center mt-10"> No keywords found.</div>}
                    </div>
                  </div>

                  < div className="border border-gray-400 p-1 bg-[#e0e0e0] text-gray-600 text-xs flex justify-between" >
                    <span>Total Items: {getTotalItemsCount(filteredData)} </span>
                    <span>(Tip: Double click to edit, Ctrl + C / V to copy) </span>
                  </div>

                  {/* Action Buttons */}
                  <div className="flex justify-between gap-2 pt-1" >
                    <div className="text-xs text-gray-500 self-center" > Right - click for colors and actions </div>
                    < div className="flex gap-2" >
                      <button onClick={() => handleAddFolder(selectedNode)} className="px-4 py-1 bg-[#f0f0f0] border-2 border-white border-r-gray-600 border-b-gray-600 active:border-gray-600 active:border-r-white active:border-b-white text-sm" > New Folder </button>
                      < button onClick={() => handleAddNode(selectedNode)} className="px-4 py-1 bg-[#f0f0f0] border-2 border-white border-r-gray-600 border-b-gray-600 active:border-gray-600 active:border-r-white active:border-b-white text-sm" > New Card </button>
                      < button onClick={() => handleDeleteNode(selectedNode)} className="px-4 py-1 bg-[#f0f0f0] border-2 border-white border-r-gray-600 border-b-gray-600 active:border-gray-600 active:border-r-white active:border-b-white text-sm" > Delete </button>
                    </div>
                  </div>
                </div>
              </div>
            </DraggableWindow>

            {/* Open Keyword Forms */}
            {
              openForms.map(form => (
                <DraggableWindow
                  key={form.id}
                  id={form.id}
                  title={`*${form.node.name.replace(/^\*/, '')} Input Form`}
                  initialPos={form.pos}
                  zIndex={form.zIndex}
                  onFocus={() => {
                    const newZ = maxZIndex + 1;
                    setMaxZIndex(newZ);
                    setOpenForms(prev => prev.map(f => f.id === form.id ? { ...f, zIndex: newZ } : f));
                  }}
                  onClose={() => setOpenForms(prev => prev.filter(f => f.id !== form.id))}
                  isMinimized={form.isMinimized}
                  onMinimize={() => setOpenForms(prev => prev.map(f => f.id === form.id ? { ...f, isMinimized: true } : f))}
                  isMaximized={form.isMaximized}
                  onMaximize={() => setOpenForms(prev => prev.map(f => f.id === form.id ? { ...f, isMaximized: !f.isMaximized } : f))}
                  width={1000}
                >
                  <div className="p-2 flex-1 flex flex-col h-full bg-[#f0f0f0] min-h-0 overflow-auto" >
                    <InputFormView editingNode={form.node} onClose={() => setOpenForms(prev => prev.filter(f => f.id !== form.id))} />
                  </div>
                </DraggableWindow>
              ))}
            {/* ReactQuill Editor Overlay */}
            {isEditorOpen && (
              <DraggableWindow
                id="editor"
                title={`Editing Notes for: ${selectedParameter}`}
                zIndex={notesEditorWindow.zIndex}
                onFocus={() => {
                  const newZ = maxZIndex + 1;
                  setMaxZIndex(newZ);
                  setNotesEditorWindow(prev => ({ ...prev, zIndex: newZ }));
                }}
                onClose={() => {
                  setIsEditorOpen(false);
                  // Save note automatically when closing the window
                  setParameterNotes(prev => ({ ...prev, [selectedParameter]: tempNote }));
                }}
                isMinimized={notesEditorWindow.isMinimized}
                onMinimize={() => setNotesEditorWindow(prev => ({ ...prev, isMinimized: true }))}
                isMaximized={notesEditorWindow.isMaximized}
                onMaximize={() => setNotesEditorWindow(prev => ({ ...prev, isMaximized: !prev.isMaximized }))}
                initialPos={{ x: 100, y: 100 }}
                width={600}
                height={400}
                maxHeight={2000}
              >
                <div className="w-full h-full flex flex-col bg-white" >
                  <div className="flex-1 overflow-hidden" >
                    <ReactQuill
                      theme="snow"
                      value={tempNote}
                      onChange={setTempNote}
                      className="h-full border-0"
                      modules={quillModules} // Use the expanded quillModules
                    />
                  </div>
                  <div className="p-3 border-t bg-gray-50 flex justify-end gap-2" >
                    <button
                      className="px-4 py-2 border-2 border-gray-400 bg-[#f0f0f0] active:border-r-white active:border-b-white hover:bg-gray-200"
                      onClick={() => setIsEditorOpen(false)}
                    >
                      Cancel
                    </button>
                    <button
                      className="px-4 py-2 border-2 border-white border-r-gray-600 border-b-gray-600 bg-blue-100 active:border-gray-600 active:border-r-white active:border-b-white hover:bg-blue-200 font-bold"
                      onClick={() => {
                        setParameterNotes(prev => ({ ...prev, [selectedParameter]: tempNote }));
                        setIsEditorOpen(false);
                      }}
                    >
                      Save Notes
                    </button>
                  </div>
                </div>
              </DraggableWindow>
            )}

            {/* Render Bottom Taskbar */}
            <TaskBar windows={getTaskbarWindows()} onWindowClick={handleTaskbarClick} />
          </div>
        </AppContext.Provider>
      );
    };

    const root = createRoot(document.getElementById('root'));
    root.render(<KeywordManager />);
  </script>
</body>

</html>
